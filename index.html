<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBoy AI Pro | Yusuf Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00f2ff; 
            --accent-glow: rgba(0, 242, 255, 0.3);
            --bg-deep: #050a10; 
            --panel: rgba(17, 27, 33, 0.95);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #e9edef;
            --user-bubble: #005c4b; 
            --bot-bubble: #202c33; 
            --input-bg: #2a3942;
        }

        .light-theme {
            --bg-deep: #efeae2;
            --panel: #f0f2f5;
            --border: rgba(0, 0, 0, 0.1);
            --text-main: #111b21;
            --user-bubble: #d9fdd3;
            --bot-bubble: #ffffff;
            --accent: #00a884;
            --input-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100dvh; width: 100vw; background: var(--bg-deep); color: var(--text-main); overflow: hidden; position: fixed; transition: 0.3s ease; }
        
        body { display: flex; }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--panel); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; transition: 0.4s; z-index: 2001; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 2000; backdrop-filter: blur(5px); }

        /* Main View */
        .main { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
        .top-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--panel); border-bottom: 1px solid var(--border); z-index: 10; }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .message-wrapper { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        /* Bubbles */
        .message-row { display: flex; width: 100%; align-items: flex-end; gap: 10px; animation: msgFade 0.3s ease; }
        @keyframes msgFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .bot-row { justify-content: flex-start; }
        .user-row { justify-content: flex-end; }

        .avatar { width: 35px; height: 35px; border-radius: 50%; flex-shrink: 0; transition: 0.3s; }
        .bot-avatar { background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        .bot-avatar.talking { box-shadow: 0 0 15px var(--accent); animation: glow 1s infinite alternate; }
        @keyframes glow { from { transform: scale(1); } to { transform: scale(1.1); } }

        .chat-bubble { padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bot-msg { background: var(--bot-bubble); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .user-msg { background: var(--user-bubble); border-bottom-right-radius: 4px; }

        /* Thinking */
        .thinking { font-size: 0.8rem; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 600; }

        /* CODE BLOCK FIX */
        .code-block { margin: 10px 0; background: #0d1117; border-radius: 8px; border: 1px solid #30363d; overflow: hidden; color: #c9d1d9; }
        .code-header { background: #161b22; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; font-size: 0.7rem; }
        .copy-btn { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 0.6rem; }
        pre { padding: 15px; overflow-x: auto; font-family: 'Fira Code', monospace; white-space: pre; font-size: 0.85rem; }

        /* Inputs */
        .input-wrap { padding: 10px 15px; background: var(--panel); border-top: 1px solid var(--border); }
        .input-box { max-width: 900px; margin: 0 auto; background: var(--input-bg); border-radius: 25px; padding: 5px 10px; display: flex; align-items: center; gap: 10px; border: 1px solid var(--border); }
        input { flex: 1; background: none; border: none; color: var(--text-main); outline: none; font-size: 1rem; padding: 8px; }
        .action-btn { background: none; border: none; color: #8696a0; cursor: pointer; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        #stopBtn { display: none; color: #ff3b3b; }
        .send-btn { background: var(--accent); color: #000; }

        .theme-toggle { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; cursor: pointer; }

        @media (max-width: 768px) { .sidebar { position: fixed; left: -280px; height: 100dvh; } .sidebar.open { left: 0; } .sidebar.open + .sidebar-overlay { display: block; } }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <h2 style="color: var(--accent);">GrieezBoy</h2>
        <p style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px; margin-bottom: 20px;">V12 | YUSUF EDITION</p>
        
        <button onclick="location.reload()" style="padding: 12px; border: none; border-radius: 8px; background: var(--accent); color: #000; font-weight: 700; width: 100%; cursor: pointer;">NEW CHAT</button>

        <div class="theme-toggle" onclick="toggleTheme()">
            <span style="font-size: 0.8rem; font-weight: 600;">Theme Mode</span>
            <i class="fas fa-moon" id="themeIcon"></i>
        </div>

        <div style="margin-top: 20px;">
            <label style="font-size: 0.65rem; font-weight: 800; opacity: 0.4;">VOICE ENGINE</label>
            <select id="voiceSelect" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; background: #202c33; color: white; border: none;">
                <option value="Rex">Rex (Pro)</option>
                <option value="malev1">Male V1</option>
                <option value="femalev1">Female V1</option>
            </select>
        </div>
    </aside>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main class="main">
        <nav class="top-nav">
            <i class="fas fa-bars action-btn" onclick="toggleSidebar()" style="color: var(--text-main)"></i>
            <span style="font-weight: 600; font-size: 0.9rem;">GRIEEZBOY PRO</span>
            <div style="width: 35px;"></div>
        </nav>

        <div class="chat-area" id="chatArea">
            <div class="message-wrapper" id="chatMessages">
                <div class="message-row bot-row">
                    <div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>
                    <div class="chat-bubble bot-msg">System Active. <b>GrieezBoy</b> ready for commands.</div>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <button class="action-btn" id="micBtn" onclick="startMic()"><i class="fas fa-microphone"></i></button>
                <button class="action-btn" id="stopBtn" onclick="stopSpeech()"><i class="fas fa-stop-circle"></i></button>
                <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
                <button class="action-btn send-btn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sidebar = document.getElementById('sidebar');
        const voiceSelect = document.getElementById('voiceSelect');
        const stopBtn = document.getElementById('stopBtn');
        const micBtn = document.getElementById('micBtn');

        let isBusy = false, currentAudio = null;

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const icon = document.getElementById('themeIcon');
            icon.className = document.body.classList.contains('light-theme') ? 'fas fa-sun' : 'fas fa-moon';
        }

        function toggleSidebar() { 
            sidebar.classList.toggle('open'); 
            document.getElementById('overlay').style.display = sidebar.classList.contains('open') ? 'block' : 'none'; 
        }

        function stopSpeech() {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            window.speechSynthesis.cancel();
            stopBtn.style.display = 'none';
            micBtn.style.display = 'flex';
            document.querySelectorAll('.bot-avatar').forEach(a => a.classList.remove('talking'));
        }

        function speak(text) {
            stopSpeech();
            const cleanText = text.replace(/```([\s\S]*?)```/g, ' Code snippet ').replace(/[#*`_-]/g, '');
            const url = `https://eliteprotech-apis.zone.id/tts?text=${encodeURIComponent(cleanText)}&voice=${voiceSelect.value}`;
            currentAudio = new Audio(url);
            currentAudio.onplay = () => { 
                stopBtn.style.display = 'flex'; micBtn.style.display = 'none';
                document.querySelectorAll('.bot-avatar').forEach(a => a.classList.add('talking'));
            };
            currentAudio.onended = () => stopSpeech();
            currentAudio.play().catch(() => {
                const utter = new SpeechSynthesisUtterance(cleanText);
                utter.onstart = () => { stopBtn.style.display = 'flex'; micBtn.style.display = 'none'; };
                utter.onend = () => stopSpeech();
                window.speechSynthesis.speak(utter);
            });
        }

        function formatMsg(text) {
            // Fix the common API character encoding issues
            let clean = text.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&').replace(/<br\s*\/?>/gi, '\n');
            
            // Format Bold
            clean = clean.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            
            // Format Code Blocks properly
            return clean.replace(/```([\s\S]*?)```/g, (m, code) => {
                const b64 = btoa(unescape(encodeURIComponent(code.trim())));
                return `<div class="code-block">
                    <div class="code-header"><span>GRIEEZBOY CODE</span><button class="copy-btn" onclick="copyCode(this,'${b64}')">COPY</button></div>
                    <pre><code>${code.trim()}</code></pre>
                </div>`;
            });
        }

        function copyCode(btn, b64) {
            navigator.clipboard.writeText(atob(b64)).then(() => {
                btn.innerText = "COPIED";
                setTimeout(() => btn.innerText = "COPY", 2000);
            });
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || isBusy) return;
            isBusy = true; userInput.value = "";

            // User Message
            const uRow = document.createElement('div');
            uRow.className = 'message-row user-row';
            uRow.innerHTML = `<div class="chat-bubble user-msg">${val}</div><img src="https://api.dicebear.com/7.x/bottts/svg?seed=Yusuf" class="avatar">`;
            chatMessages.appendChild(uRow);
            chatArea.scrollTo(0, chatArea.scrollHeight);

            // Bot Thinking
            const bRow = document.createElement('div');
            bRow.className = 'message-row bot-row';
            bRow.innerHTML = `<div class="avatar bot-avatar"><i class="fas fa-robot"></i></div><div class="chat-bubble bot-msg"><div class="thinking"><i class="fas fa-brain fa-spin"></i> GrieezBoy thinking...</div><span class="txt"></span></div>`;
            chatMessages.appendChild(bRow);
            chatArea.scrollTo(0, chatArea.scrollHeight);

            try {
                const res = await fetch('https://eliteprotech-apis.zone.id/copilot?q=' + encodeURIComponent(val));
                const data = await res.json();
                bRow.querySelector('.thinking').remove();
                
                const reply = data.text.replace(/Copilot/gi, "GrieezBoy");
                const target = bRow.querySelector('.txt');
                speak(reply);

                let i = 0;
                const timer = setInterval(() => {
                    if (i < reply.length) {
                        target.textContent += reply.charAt(i++);
                        chatArea.scrollTop = chatArea.scrollHeight;
                    } else {
                        clearInterval(timer);
                        target.parentElement.innerHTML = formatMsg(reply);
                        isBusy = false;
                    }
                }, 10);
            } catch {
                bRow.innerHTML = `<div class="avatar bot-avatar"><i class="fas fa-robot"></i></div><div class="chat-bubble bot-msg">Connection Error.</div>`;
                isBusy = false;
            }
        }

        function startMic() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Rec) return;
            const s = new Rec();
            s.onstart = () => micBtn.style.color = 'var(--accent)';
            s.onend = () => micBtn.style.color = '#8696a0';
            s.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleSend(); };
            s.start();
        }

        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
