<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBoy AI | Yusuf Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00f2ff; 
            --accent-glow: rgba(0, 242, 255, 0.4);
            --bg: #0b141a; 
            --glass: #111b21;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e9edef;
            --user-bubble: #005c4b; 
            --bot-bubble: #202c33; 
        }

        .light-mode {
            --bg: #efeae2; 
            --glass: #f0f2f5;
            --border: rgba(0, 0, 0, 0.08);
            --text: #111b21;
            --accent: #00a884;
            --user-bubble: #d9fdd3; 
            --bot-bubble: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            height: 100vh; width: 100vw; background: var(--bg); color: var(--text); 
            display: flex; overflow: hidden; transition: background 0.3s ease;
        }

        /* Sidebar */
        .sidebar { 
            width: 300px; background: var(--glass); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 25px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2001;
        }

        .sidebar-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            display: none; z-index: 2000;
        }

        /* Main Chat Layout */
        .main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }

        .top-nav { 
            height: 65px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 20px; background: var(--glass); border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        /* ANIMATED BOT BACKGROUND */
        .chat-area { 
            flex: 1; overflow-y: auto; padding: 20px 5%; scroll-behavior: smooth; 
            position: relative; z-index: 1;
        }
        
        .chat-area::before {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 400px; height: 400px;
            /* Cool looping tech/bot animation */
            background-image: url('https://i.pinimg.com/originals/c7/e1/b7/c7e1b7b5753737039e1bfcda313f2728.gif'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.06; /* Kept very low so text remains readable */
            z-index: -1;
            pointer-events: none;
        }
        
        .light-mode .chat-area::before { opacity: 0.04; mix-blend-mode: multiply; }

        .message-wrapper { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 20px; }

        /* AVATARS & ALIGNMENT */
        .message-row { display: flex; width: 100%; align-items: flex-end; gap: 10px; animation: fadeIn 0.3s ease; }
        .user-row { justify-content: flex-end; flex-direction: row-reverse; }
        .bot-row { justify-content: flex-start; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .avatar { 
            width: 32px; height: 32px; border-radius: 50%; 
            flex-shrink: 0; object-fit: cover;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .bot-avatar { 
            background: var(--accent); color: #000; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.9rem; box-shadow: 0 0 12px var(--accent-glow); 
        }

        .chat-bubble { 
            padding: 10px 14px; border-radius: 12px; 
            line-height: 1.5; font-size: 0.95rem; max-width: 75%; 
            position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.15);
            word-wrap: break-word;
        }

        .bot-msg { background: var(--bot-bubble); color: var(--text); border-bottom-left-radius: 4px; }
        .user-msg { background: var(--user-bubble); color: var(--text); border-bottom-right-radius: 4px; }
        
        .light-mode .user-msg, .light-mode .bot-msg { color: #111b21; }

        /* Voice Selector */
        .setting-label { font-size: 0.75rem; margin: 15px 0 8px; opacity: 0.6; font-weight: 600; letter-spacing: 0.5px; }
        select {
            width: 100%; padding: 12px; border-radius: 8px; background: var(--bg);
            color: var(--text); border: 1px solid var(--border); outline: none; margin-bottom: 20px; cursor: pointer;
        }

        /* Input Bar */
        .input-wrap { padding: 15px 5%; background: var(--glass); z-index: 10; }
        .input-box { 
            max-width: 900px; margin: 0 auto; background: var(--bg); 
            border: 1px solid var(--border); padding: 8px 12px; 
            border-radius: 24px; display: flex; align-items: center; gap: 12px;
        }
        input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 1rem; padding-left: 10px; }
        
        .action-btn { 
            background: none; border: none; color: #8696a0; cursor: pointer; 
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; font-size: 1.2rem;
        }
        .send-btn { background: var(--accent); color: #fff; width: 42px; height: 42px; }

        pre { background: #000; color: #0f0; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-family: monospace; border: 1px solid #333; }
        .dl-btn { background: var(--accent); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; margin-top: 8px; }

        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: -300px; height: 100%; }
            .sidebar.open { left: 0; }
            .sidebar.open + .sidebar-overlay { display: block; }
            .chat-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <h2 style="color: var(--accent); letter-spacing: -0.5px;">GrieezBoy</h2>
        <p style="font-size: 0.75rem; opacity: 0.5; margin-bottom: 30px;">AI System by Yusuf</p>
        
        <button onclick="location.reload()" style="padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer; margin-bottom: 25px;">
            <i class="fas fa-plus"></i> New Chat
        </button>

        <div class="setting-label"><i class="fas fa-headset"></i> SELECT AI VOICE</div>
        <select id="voiceSelect">
            <option value="Rex">Rex</option>
            <option value="Male v1">Male v1</option>
            <option value="Female v1">Female v1</option>
            <option value="Male v2">Male v2</option>
            <option value="Female v2">Female v2</option>
        </select>

        <div style="margin-top: auto; font-size: 0.7rem; opacity: 0.3; text-align: center;">GrieezBoy Engine 3.1</div>
    </aside>
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <main class="main">
        <nav class="top-nav">
            <button onclick="toggleSidebar()" class="action-btn" style="color: var(--text);"><i class="fas fa-bars"></i></button>
            <span style="font-weight: 600; font-size: 1rem;">GrieezBoy AI</span>
            <div style="display: flex; gap: 5px;">
                <button onclick="toggleTheme()" class="action-btn" id="themeBtn"><i class="fas fa-moon"></i></button>
                <button onclick="toggleMute()" class="action-btn" id="muteIcon"><i class="fas fa-volume-up"></i></button>
            </div>
        </nav>

        <div class="chat-area" id="chatArea">
            <div class="message-wrapper" id="chatMessages">
                <div class="message-row bot-row">
                    <div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>
                    <div class="chat-bubble bot-msg">System Online. Welcome back, I am <b>GrieezBot</b>. How can I assist you today?</div>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <button id="micBtn" class="action-btn"><i class="fas fa-microphone"></i></button>
                <input type="text" id="userInput" placeholder="Message GrieezBoy..." autocomplete="off">
                <button class="action-btn send-btn" id="sendBtn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sidebar = document.getElementById('sidebar');
        const voiceSelect = document.getElementById('voiceSelect');
        
        let isMuted = false, isBusy = false;
        let currentAudio = null;

        // CUSTOM API TEXT TO SPEECH
        function speak(text) {
            if (isMuted) return;
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            
            const cleanTextForSpeech = text.replace(/```([\s\S]*?)```/g, ' Code Block ').replace(/[#*`_-]/g, '');
            const selectedVoice = voiceSelect.value;
            
            const url = `https://eliteprotech-apis.zone.id/tts?text=${encodeURIComponent(cleanTextForSpeech)}&voice=${encodeURIComponent(selectedVoice)}`;
            
            currentAudio = new Audio(url);
            currentAudio.play().catch(e => console.log("Audio playback blocked:", e));
        }

        // UI Logic
        function toggleSidebar() { sidebar.classList.toggle('open'); }
        function closeSidebar() { sidebar.classList.remove('open'); }
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeBtn').innerHTML = document.body.classList.contains('light-mode') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        }
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteIcon').innerHTML = isMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            if (isMuted && currentAudio) currentAudio.pause();
        }

        function formatText(text) {
            let safe = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            safe = safe.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                       .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                       .replace(/\n/g, '<br>');
            
            if (text.includes("<!DOCTYPE") || text.includes("<html")) {
                safe += `<br><button class="dl-btn" onclick="downloadCode(\`${btoa(text)}\`)"><i class="fas fa-download"></i> Download GrieezBoy Code</button>`;
            }
            return safe;
        }

        function downloadCode(b64) {
            const a = document.createElement('a');
            a.href = 'data:text/html;base64,' + b64;
            a.download = 'GrieezBoy_Output.html';
            a.click();
        }

        function addMessage(text, isUser, isImage = false) {
            const div = document.createElement('div');
            div.className = `message-row ${isUser ? 'user-row' : 'bot-row'}`;
            
            const formattedContent = isImage ? `<img src="${text}" style="width:100%; border-radius:8px; margin-top:5px;">` : formatText(text);

            // Fetch a random cool avatar for the human
            const randomSeed = Math.random().toString(36).substring(7);
            const userAvatarStr = `<img src="https://api.dicebear.com/7.x/adventurer/svg?seed=${randomSeed}" class="avatar bg-white">`;
            const botAvatarStr = `<div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>`;

            div.innerHTML = `
                ${isUser ? userAvatarStr : botAvatarStr}
                <div class="chat-bubble ${isUser ? 'user-msg' : 'bot-msg'}">
                    ${isUser ? text : (isImage ? formattedContent : '<span class="typing"></span>')}
                </div>
            `;

            chatMessages.appendChild(div);
            chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });

            if (!isUser && !isImage) {
                const target = div.querySelector('.typing');
                let i = 0;
                
                const typeTimer = setInterval(() => {
                    if (i < text.length) {
                        target.textContent += text.charAt(i);
                        i++;
                        chatArea.scrollTop = chatArea.scrollHeight;
                    } else {
                        clearInterval(typeTimer);
                        target.parentElement.innerHTML = formattedContent;
                        speak(text);
                        isBusy = false;
                        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
                    }
                }, 15);
            } else if (isImage) {
                isBusy = false;
            }
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || isBusy) return;
            
            isBusy = true;
            userInput.value = "";
            addMessage(val, true);

            const lowVal = val.toLowerCase();
            
            if (lowVal.includes("draw") || lowVal.includes("generate image")) {
                const p = val.replace(/draw|generate image/gi, "").trim();
                addMessage(`https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?nologo=true`, false, true);
                return;
            }

            if (lowVal.includes("who are you") || lowVal.includes("your name")) {
                addMessage("I am **GrieezBot**, a specialized AI model developed by **Yusuf**.", false);
                return;
            }

            try {
                const tempDiv = document.createElement('div');
                tempDiv.className = 'message-row bot-row temp-typing';
                tempDiv.innerHTML = `
                    <div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>
                    <div class="chat-bubble bot-msg"><i>Thinking...</i></div>
                `;
                chatMessages.appendChild(tempDiv);
                chatArea.scrollTop = chatArea.scrollHeight;

                const res = await fetch('https://eliteprotech-apis.zone.id/copilot?q=' + encodeURIComponent(val));
                const data = await res.json();
                
                document.querySelector('.temp-typing').remove();
                
                let cleanText = data.text.replace(/Copilot/gi, "GrieezBoy").replace(/Microsoft/gi, "GrieezBoy");
                addMessage(cleanText, false);
            } catch {
                document.querySelector('.temp-typing')?.remove();
                addMessage("Network error. Please ensure Yusuf's API is reachable.", false);
                isBusy = false;
            }
        }

        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
            const rec = new SpeechRec();
            document.getElementById('micBtn').onclick = () => { rec.start(); document.getElementById('micBtn').style.color = 'var(--accent)'; };
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleSend(); };
            rec.onend = () => { document.getElementById('micBtn').style.color = '#8696a0'; };
        }

        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
