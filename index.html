<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBot Pro | Google Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #4285f4; /* Google Blue */
            --bg: #0b141a; 
            --glass: #111b21;
            --border: rgba(255, 255, 255, 0.1);
            --text: #e9edef;
            --user-bubble: #005c4b; 
            --bot-bubble: #202c33; 
        }

        .light-mode {
            --bg: #f8f9fa; 
            --glass: #ffffff;
            --border: rgba(0, 0, 0, 0.1);
            --text: #202124;
            --accent: #1a73e8;
            --user-bubble: #e8f0fe; 
            --bot-bubble: #f1f3f4; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { 
            height: 100dvh; width: 100vw; overflow: hidden; 
            background: var(--bg); display: flex; transition: background 0.3s ease; 
        }

        .sidebar { 
            width: 280px; background: var(--glass); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2001;
        }

        .sidebar-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            display: none; z-index: 2000; backdrop-filter: blur(2px);
        }

        .main { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; width: 100%; }

        .top-nav { 
            height: 65px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: var(--glass); border-bottom: 1px solid var(--border);
        }

        .chat-area { 
            flex: 1; overflow-y: auto; padding: 20px 10px; 
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .message-wrapper { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        .message-row { display: flex; width: 100%; animation: slideIn 0.3s ease; align-items: flex-start; gap: 10px; }
        .user-row { justify-content: flex-end; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .chat-bubble { 
            padding: 14px 18px; border-radius: 18px; line-height: 1.6; font-size: 0.95rem; 
            max-width: 80%; position: relative; word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .bot-msg { background: var(--bot-bubble); color: var(--text); border-top-left-radius: 4px; }
        .user-msg { background: var(--user-bubble); color: var(--text); border-top-right-radius: 4px; }

        .speak-btn {
            background: none; border: 1px solid var(--border); color: var(--text);
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; transition: all 0.2s; margin-top: 5px;
        }
        .speak-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .input-wrap { padding: 15px; background: var(--glass); border-top: 1px solid var(--border); }
        .input-box { 
            max-width: 850px; margin: 0 auto; background: var(--bg); 
            border: 1px solid var(--border); padding: 5px 15px; 
            border-radius: 30px; display: flex; align-items: center; gap: 10px;
        }
        input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 1rem; padding: 12px 0; }

        .action-btn { background: none; border: none; color: #8696a0; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; }
        .send-btn { background: var(--accent); color: white; }

        #micBtn.listening { color: #ea4335; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: -280px; height: 100dvh; }
            .sidebar.open { transform: translateX(280px); }
            .sidebar.open + .sidebar-overlay { display: block; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <h2 style="color: var(--accent); font-weight: 800;">GrieezBoy AI</h2>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 20px;">Powered by Google Speech</p>
        
        <div style="margin-bottom: 20px;">
            <label style="font-size: 0.7rem; font-weight: 700;">AUTO-READ RESPONSES</label>
            <input type="checkbox" id="autoRead" checked style="margin-left: 10px;">
        </div>

        <label style="font-size: 0.7rem; font-weight: 700;">VOICE SELECTION</label>
        <select id="voiceSelect" style="width: 100%; padding: 10px; background: var(--bg); color: var(--text); border-radius: 8px; margin-top: 5px;"></select>

        <label style="font-size: 0.7rem; font-weight: 700; display: block; margin-top: 15px;">PITCH</label>
        <input type="range" id="pitch" min="0" max="2" step="0.1" value="1" style="width: 100%;">

        <label style="font-size: 0.7rem; font-weight: 700; display: block; margin-top: 15px;">SPEED</label>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1" style="width: 100%;">
    </aside>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main class="main">
        <nav class="top-nav">
            <button onclick="toggleSidebar()" class="action-btn" style="color: var(--text);"><i class="fas fa-bars"></i></button>
            <div style="font-weight: 700;">GrieezBot Pro</div>
            <button onclick="toggleTheme()" class="action-btn"><i class="fas fa-adjust"></i></button>
        </nav>

        <div class="chat-area" id="chatArea">
            <div class="message-wrapper" id="chatMessages">
                <div class="message-row bot-row">
                    <div class="chat-bubble bot-msg">Welcome. I am <b>GrieezBoy's Pro AI</b>. I am now using Google's native Speech Synthesis for clearer, faster voice responses.</div>
                    <button class="speak-btn" onclick="speakText(this.previousElementSibling.innerText, this)"><i class="fas fa-volume-up"></i></button>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <button id="micBtn" class="action-btn"><i class="fas fa-microphone"></i></button>
                <input type="text" id="userInput" placeholder="Ask GrieezBoy anything...">
                <button class="action-btn send-btn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        const synth = window.speechSynthesis;
        const voiceSelect = document.getElementById('voiceSelect');
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sidebar = document.getElementById('sidebar');
        const autoRead = document.getElementById('autoRead');

        let voices = [];

        // --- Load Google Voices ---
        function populateVoices() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = '';
            voices.forEach((voice, i) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = i;
                if(voice.name.includes("Google")) option.selected = true;
                voiceSelect.appendChild(option);
            });
        }
        populateVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoices;
        }

        function toggleSidebar() { sidebar.classList.toggle('open'); }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        // --- Google TTS Function ---
        function speakText(text, btn) {
            if (synth.speaking) synth.cancel();
            
            const utter = new SpeechSynthesisUtterance(text);
            utter.voice = voices[voiceSelect.value];
            utter.pitch = document.getElementById('pitch').value;
            utter.rate = document.getElementById('rate').value;

            utter.onstart = () => btn?.classList.add('active');
            utter.onend = () => btn?.classList.remove('active');
            
            synth.speak(utter);
        }

        function addMessage(text, isUser) {
            const row = document.createElement('div');
            row.className = `message-row ${isUser ? 'user-row' : 'bot-row'}`;
            
            if (isUser) {
                row.innerHTML = `<div class="chat-bubble user-msg">${text}</div>`;
            } else {
                row.innerHTML = `
                    <div class="chat-bubble bot-msg">${text}</div>
                    <button class="speak-btn"><i class="fas fa-volume-up"></i></button>
                `;
                const btn = row.querySelector('.speak-btn');
                btn.onclick = () => speakText(text, btn);
                
                // Trigger Auto-Read if enabled
                if(autoRead.checked) speakText(text, btn);
            }

            chatMessages.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if(!val) return;
            userInput.value = '';
            addMessage(val, true);

            try {
                const res = await fetch(`https://eliteprotech-apis.zone.id/copilot?q=${encodeURIComponent(val)}`);
                const data = await res.json();
                let reply = data.text.replace(/Copilot/gi, "GrieezBot");
                addMessage(reply, false);
            } catch {
                addMessage("I am having trouble connecting to the GrieezBoy brain.", false);
            }
        }

        // --- Mic Logic ---
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
            const recognition = new SpeechRec();
            document.getElementById('micBtn').onclick = () => {
                recognition.start();
                document.getElementById('micBtn').classList.add('listening');
            };
            recognition.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                handleSend();
            };
            recognition.onend = () => document.getElementById('micBtn').classList.remove('listening');
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
