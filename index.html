<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>GrieezBot AI | Yusuf Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--accent:#00f2ff;
--accent-glow:rgba(0,242,255,0.4);
--bg:#0b141a;
--glass:#111b21;
--border:rgba(255,255,255,0.08);
--text:#e9edef;
--user-bubble:#005c4b;
--bot-bubble:#202c33;
}

.light-mode{
--bg:#efeae2;
--glass:#f0f2f5;
--border:rgba(0,0,0,0.08);
--text:#111b21;
--accent:#00a884;
--user-bubble:#d9fdd3;
--bot-bubble:#ffffff;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
-webkit-tap-highlight-color:transparent;
}

/* FIXED BODY */

html,body{
height:100%;
width:100%;
background:var(--bg);
color:var(--text);
}

body{
display:flex;
min-height:100vh;
overflow:hidden;
transition:background .3s ease;
}

/* SIDEBAR */

.sidebar{
width:300px;
background:var(--glass);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
padding:25px;
transition:.3s;
z-index:2001;
overflow-y:auto;
}

.sidebar-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
z-index:2000;
}

/* MAIN LAYOUT */

.main{
flex:1;
display:flex;
flex-direction:column;
height:100%;
min-width:0;
}

/* NAVBAR */

.top-nav{
height:65px;
flex-shrink:0;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:var(--glass);
border-bottom:1px solid var(--border);
}

/* CHAT AREA */

.chat-area{
flex:1;
overflow-y:auto;
overflow-x:hidden;
padding:20px 5%;
scroll-behavior:smooth;
background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
background-size:contain;
opacity:.95;
}

/* MESSAGE WRAPPER */

.message-wrapper{
max-width:900px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

/* MESSAGE ROWS */

.message-row{
display:flex;
width:100%;
animation:fadeIn .3s ease;
}

.user-row{justify-content:flex-end;}
.bot-row{justify-content:flex-start;}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

/* BUBBLES */

.chat-bubble{
padding:10px 14px;
border-radius:12px;
line-height:1.5;
font-size:.95rem;
max-width:80%;
box-shadow:0 1px 2px rgba(0,0,0,.15);
word-wrap:break-word;
}

.bot-msg{
background:var(--bot-bubble);
border-top-left-radius:0;
}

.user-msg{
background:var(--user-bubble);
border-top-right-radius:0;
}

.light-mode .user-msg,
.light-mode .bot-msg{
color:#111b21;
}

/* INPUT AREA FIX */

.input-wrap{
flex-shrink:0;
padding:15px 5%;
background:var(--glass);
}

.input-box{
max-width:900px;
margin:auto;
background:var(--bg);
border:1px solid var(--border);
padding:8px 12px;
border-radius:24px;
display:flex;
align-items:center;
gap:12px;
}

input{
flex:1;
background:none;
border:none;
color:var(--text);
outline:none;
font-size:1rem;
padding-left:10px;
}

/* BUTTONS */

.action-btn{
background:none;
border:none;
color:#8696a0;
cursor:pointer;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
transition:.2s;
font-size:1.2rem;
}

.send-btn{
background:var(--accent);
color:#fff;
width:42px;
height:42px;
}

/* CODE */

pre{
background:#111b21;
color:#e9edef;
padding:12px;
border-radius:8px;
overflow-x:auto;
margin:8px 0;
font-family:monospace;
border:1px solid #202c33;
}

.dl-btn{
background:var(--accent);
color:#fff;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
font-size:.8rem;
font-weight:600;
margin-top:8px;
}

/* MOBILE FIX */

@media(max-width:768px){

.sidebar{
position:fixed;
left:-300px;
top:0;
height:100%;
}

.sidebar.open{
left:0;
}

.sidebar.open + .sidebar-overlay{
display:block;
}

.chat-area{
padding:15px;
}

}

</style>
</head>

<body>

<!-- Everything below remains EXACTLY your original HTML -->

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">

<h2 style="color:var(--accent)">GrieezBoy Pro</h2>

<p style="font-size:.75rem;opacity:.5;margin-bottom:30px">AI System by Yusuf</p>

<button onclick="location.reload()" style="padding:12px;border-radius:8px;border:none;background:var(--accent);color:#000;font-weight:800;margin-bottom:25px">

<i class="fas fa-plus"></i> NEW SESSION

</button>

<div class="setting-label">Voice Selection</div>

<select id="voiceSelect">

<option value="rex">Rex (Default AI)</option>

<option value="malev1">Male Classic</option>

<option value="malev2">Male Studio</option>

<option value="famalev1">Female Classic</option>

<option value="famalev2">Female Studio</option>

</select>

<div class="setting-label">

Speech Speed: <span id="speedVal">1.0</span>x

</div>

<input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1.0" oninput="document.getElementById('speedVal').innerText=this.value">

<div style="margin-top:auto;font-size:.7rem;opacity:.3;text-align:center">

Vocal Engine Active

</div>

</aside>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->

<main class="main">

<nav class="top-nav">

<button onclick="toggleSidebar()" class="action-btn">

<i class="fas fa-bars"></i>

</button>

<div style="display:flex;flex-direction:column;align-items:center">

<span style="font-weight:800;font-size:.9rem;letter-spacing:1px">

GRIEEZBOT AI

</span>

<div class="voice-wave" id="visualizer">

<span></span><span></span><span></span>

</div>

</div>

<div style="display:flex;gap:5px">

<button onclick="toggleTheme()" class="action-btn" id="themeBtn">

<i class="fas fa-moon"></i>

</button>

<button onclick="toggleMute()" class="action-btn" id="muteIcon">

<i class="fas fa-volume-up"></i>

</button>

</div>

</nav>

<div class="chat-area" id="chatArea">

<div class="message-wrapper" id="chatMessages">

<div class="message-row bot-row">

<div class="chat-bubble bot-msg">

System Online. Developed by <b>GrieezBoy</b>. Audio vocalizer ready.

</div>

</div>

</div>

</div>

<div class="input-wrap">

<div class="input-box">

<button id="micBtn" class="action-btn">

<i class="fas fa-microphone"></i>

</button>

<input type="text" id="userInput" placeholder="Ask GrieezBot anything..." autocomplete="off">

<button class="action-btn send-btn" onclick="handleSend()">

<i class="fas fa-paper-plane"></i>

</button>

</div>

</div>

</main>

<!-- KEEP YOUR ORIGINAL SCRIPT HERE -->

<script>

/* your entire original JS stays exactly here */

</script>

</body>
</html>
