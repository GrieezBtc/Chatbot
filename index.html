<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBot Pro | GrieezBoy Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #4285f4; 
            --bg: #0b141a; 
            --glass: #111b21;
            --border: rgba(255, 255, 255, 0.1);
            --text: #e9edef;
            --user-bubble: #005c4b; 
            --bot-bubble: #202c33; 
            --code-bg: #010409;
            --disclaimer: #8696a0;
            --card-bg: rgba(255, 255, 255, 0.03);
            --system-fonts: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        .light-mode {
            --bg: #f0f2f5; 
            --glass: #ffffff;
            --border: rgba(0, 0, 0, 0.1);
            --text: #111b21;
            --accent: #1a73e8;
            --user-bubble: #d9fdd3; 
            --bot-bubble: #ffffff; 
            --code-bg: #f6f8fa;
            --disclaimer: #667781;
            --card-bg: rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--system-fonts); -webkit-tap-highlight-color: transparent; }

        body { 
            height: 100dvh; width: 100vw; overflow: hidden; 
            background: var(--bg); display: flex; transition: background 0.3s ease; 
            font-size: 14px; 
        }

        .sidebar { 
            width: 260px; background: var(--glass); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 18px; 
            transition: transform 0.3s ease; z-index: 2001;
        }
        .sidebar-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            display: none; z-index: 2000; backdrop-filter: blur(2px);
        }

        .main { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; overflow: hidden; }

        .top-nav { 
            height: 54px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: var(--glass); border-bottom: 1px solid var(--border); flex-shrink: 0;
        }

        .chat-area { 
            flex: 1; overflow-y: auto; padding: 12px; 
            background-image: radial-gradient(var(--border) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            scroll-behavior: smooth;
        }
        .message-wrapper { max-width: 650px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; width: 100%; }

        .welcome-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh; text-align: center; gap: 18px; padding: 20px;
        }
        .welcome-screen h1 { font-weight: 700; color: var(--accent); font-size: 1.4rem; }
        .suggestions-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 500px;
        }
        .suggestion-card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
            padding: 12px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column;
            align-items: flex-start; gap: 5px; text-align: left;
        }
        .suggestion-card:active { transform: scale(0.97); }
        .suggestion-card i { color: var(--accent); font-size: 0.95rem; }
        .suggestion-card span { font-size: 0.78rem; font-weight: 500; color: var(--text); }

        .message-row { display: flex; width: 100%; gap: 10px; animation: slideIn 0.2s ease; align-items: flex-start; }
        .user-row { flex-direction: row-reverse; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 32px; height: 32px; border-radius: 50%; object-fit: cover;
            flex-shrink: 0; border: 1px solid var(--border); background: var(--glass);
        }

        .content-wrap { display: flex; flex-direction: column; max-width: calc(100% - 42px); width: auto; }
        .user-row .content-wrap { align-items: flex-end; }

        .chat-bubble { 
            padding: 10px 12px; border-radius: 14px; line-height: 1.5; font-size: 0.88rem; 
            width: fit-content; max-width: 100%; word-wrap: break-word; overflow-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); color: var(--text);
        }
        .bot-msg { background: var(--bot-bubble); border-top-left-radius: 2px; }
        .user-msg { background: var(--user-bubble); border-top-right-radius: 2px; }

        .image-result {
            margin-top: 10px; border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border); width: 100%; max-width: 350px;
            background: var(--code-bg); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .image-result img { width: 100%; display: block; height: auto; border-bottom: 1px solid var(--border); transition: 0.3s; }
        .image-footer { padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); }
        .download-link { color: var(--accent); text-decoration: none; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; gap: 5px; }

        .story-container {
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 0 12px 12px 0;
            font-style: italic;
            color: var(--text);
            line-height: 1.6;
            font-size: 0.9rem;
        }
        .story-title {
            color: var(--accent);
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
            font-style: normal;
            font-size: 1rem;
        }

        .code-container {
            margin-top: 10px; border-radius: 8px; overflow: hidden;
            border: 1px solid var(--border); background: var(--code-bg);
            width: 100%; display: block;
        }
        .code-header {
            background: rgba(255,255,255,0.05); padding: 6px 12px; 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.65rem; color: var(--text); border-bottom: 1px solid var(--border);
            text-transform: uppercase; font-weight: 700;
        }
        pre {
            padding: 12px; overflow-x: auto; font-family: ui-monospace, monospace;
            font-size: 0.8rem; color: #e1e1e1; white-space: pre; width: 100%;
        }
        .copy-btn {
            background: var(--accent); color: white; border: none;
            padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 0.6rem;
        }

        .thinking-ui {
            display: flex; align-items: center; gap: 6px; font-size: 0.75rem;
            color: var(--accent); margin-bottom: 4px; font-weight: 600;
        }
        .dot-loader { display: flex; gap: 3px; }
        .dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; animation: pulse 1s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.3; } }

        .bot-disclaimer { font-size: 0.65rem; color: var(--disclaimer); margin-top: 5px; font-style: italic; opacity: 0.7; }

        .speak-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text);
            width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; margin-top: 6px; transition: 0.2s;
        }
        .speak-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .input-wrap { padding: 8px 12px 14px 12px; background: var(--glass); border-top: 1px solid var(--border); flex-shrink: 0; }
        .input-box { 
            max-width: 650px; margin: 0 auto; background: var(--bg); 
            border: 1px solid var(--border); padding: 0 12px; 
            border-radius: 24px; display: flex; align-items: center; gap: 8px;
        }
        input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 0.9rem; padding: 10px 0; }
        
        #micBtn { background:none; border:none; color:#8696a0; font-size: 1rem; cursor: pointer; }
        #micBtn.recording { color: #ff4b4b; animation: micPulse 1.5s infinite; }

        .send-btn { background: var(--accent); color: white; border-radius: 50%; width: 34px; height: 34px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: -260px; height: 100dvh; }
            .sidebar.open { transform: translateX(260px); }
            .sidebar.open + .sidebar-overlay { display: block; }
            .content-wrap { max-width: calc(100% - 38px); }
            .suggestions-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <h2 style="color: var(--accent); font-weight: 700; font-size: 1.1rem;">GrieezBot Pro</h2>
        <p style="font-size: 0.65rem; opacity: 0.5; margin-bottom: 25px;">GrieezBoy Edition</p>
        
        <label style="font-size: 0.6rem; font-weight: 700; opacity: 0.6; text-transform: uppercase;">Voice Engine</label>
        <select id="voiceSelect" style="width: 100%; padding: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; margin-top: 6px; outline: none; font-size: 0.75rem;"></select>

        <div style="margin-top: 20px; display: flex; align-items: center; justify-content: space-between;">
            <span style="font-size: 0.75rem; font-weight: 600;">Auto-Speak</span>
            <input type="checkbox" id="autoRead" checked>
        </div>

        <button onclick="location.reload()" style="margin-top: auto; padding: 12px; background: var(--accent); border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; font-size: 0.8rem;">
            <i class="fas fa-redo"></i> Reset System
        </button>
    </aside>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main class="main">
        <nav class="top-nav">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--text); font-size: 1rem; cursor:pointer;"><i class="fas fa-bars-staggered"></i></button>
            <div style="font-weight: 700; color: var(--accent); font-size: 0.95rem;">GRIEEZBOT PRO</div>
            <button onclick="toggleTheme()" style="background:none; border:none; color:var(--text); font-size: 1rem; cursor:pointer;"><i class="fas fa-moon"></i></button>
        </nav>

        <div class="chat-area" id="chatArea">
            <div class="message-wrapper" id="chatMessages">
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>What can I do for you?</h1>
                    <div class="suggestions-grid">
                        <div class="suggestion-card" onclick="quickSend('Tell me a story about a brave knight')">
                            <i class="fas fa-book-open"></i>
                            <span>Tell a Story</span>
                        </div>
                        <div class="suggestion-card" onclick="quickSend('Generate an image of a fast car')">
                            <i class="fas fa-image"></i>
                            <span>Generate Image</span>
                        </div>
                        <div class="suggestion-card" onclick="quickSend('Tell me About Your developer')">
                            <i class="fas fa-user-tie"></i>
                            <span>Developer Info</span>
                        </div>
                        <div class="suggestion-card" onclick="quickSend('Write a clean HTML website for my business')">
                            <i class="fas fa-code"></i>
                            <span>Write Code</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <button id="micBtn"><i class="fas fa-microphone"></i></button>
                <input type="text" id="userInput" placeholder="Message GrieezBoy..." autocomplete="off">
                <button class="send-btn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        const synth = window.speechSynthesis;
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sidebar = document.getElementById('sidebar');
        const autoRead = document.getElementById('autoRead');
        const voiceSelect = document.getElementById('voiceSelect');
        const micBtn = document.getElementById('micBtn');
        const welcomeScreen = document.getElementById('welcomeScreen');

        let voices = [];
        let isBusy = false;

        function populateVoices() {
            voices = synth.getVoices();
            voiceSelect.innerHTML = voices.map((v, i) => `<option value="${i}" ${v.name.includes("Google") ? "selected" : ""}>${v.name}</option>`).join('');
        }
        if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = populateVoices;
        populateVoices();

        function toggleSidebar() { sidebar.classList.toggle('open'); }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        function cleanTextForSpeech(text) {
            return text
                .replace(/```[\s\S]*?```/g, ' [Code Block] ')
                .replace(/[#*&/\\<>\[\]{}|_+=-]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function speakText(text, btn) {
            if (synth.speaking) synth.cancel();
            const cleaned = cleanTextForSpeech(text);
            if (!cleaned) return;
            const utter = new SpeechSynthesisUtterance(cleaned);
            utter.voice = voices[voiceSelect.value];
            utter.onstart = () => btn?.classList.add('active');
            utter.onend = () => btn?.classList.remove('active');
            synth.speak(utter);
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderFinalContent(text) {
            const codeRegex = /```(\w*)\n?([\s\S]*?)```/g;
            let parts = [], lastIdx = 0, match;
            while ((match = codeRegex.exec(text)) !== null) {
                if (match.index > lastIdx) parts.push(simpleFormat(text.substring(lastIdx, match.index)));
                parts.push(`
                    <div class="code-container">
                        <div class="code-header"><span><i class="fas fa-code"></i> ${match[1] || 'CODE'}</span><button class="copy-btn" onclick="copyCode(this)">Copy</button></div>
                        <pre><code>${escapeHTML(match[2].trim())}</code></pre>
                    </div>
                `);
                lastIdx = match.index + match[0].length;
            }
            if (lastIdx < text.length) parts.push(simpleFormat(text.substring(lastIdx)));
            return parts.join('');
        }

        function simpleFormat(t) { 
            return t.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); 
        }
        
        function copyCode(btn) {
            navigator.clipboard.writeText(btn.closest('.code-container').querySelector('code').innerText);
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
            const rec = new SpeechRec();
            rec.onstart = () => micBtn.classList.add('recording');
            rec.onend = () => micBtn.classList.remove('recording');
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleSend(); };
            micBtn.onclick = () => { try { rec.start(); } catch { rec.stop(); } };
        }

        function quickSend(text) {
            userInput.value = text;
            handleSend();
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if(!val || isBusy) return;
            isBusy = true;
            userInput.value = '';
            
            if(welcomeScreen) welcomeScreen.remove();

            const userRow = document.createElement('div');
            userRow.className = 'message-row user-row';
            userRow.innerHTML = `<img src="https://ui-avatars.com/api/?name=User&background=005c4b&color=fff&rounded=true" class="avatar"><div class="content-wrap"><div class="chat-bubble user-msg">${escapeHTML(val)}</div></div>`;
            chatMessages.appendChild(userRow);
            chatArea.scrollTop = chatArea.scrollHeight;

            const botRow = document.createElement('div');
            botRow.className = 'message-row bot-row';
            botRow.innerHTML = `
                <img src="https://ui-avatars.com/api/?name=GB&background=4285f4&color=fff&rounded=true" class="avatar">
                <div class="content-wrap">
                    <div class="thinking-ui"><div class="dot-loader"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>GrieezBot is processing...</div>
                    <div class="chat-bubble bot-msg"></div>
                    <div class="bot-disclaimer" style="display:none">Grieezbot is AI and can make mistakes</div>
                    <button class="speak-btn" style="display:none;"><i class="fas fa-volume-up"></i></button>
                </div>`;
            chatMessages.appendChild(botRow);
            chatArea.scrollTop = chatArea.scrollHeight;

            const query = val.toLowerCase();
            const isDeveloper = ["tell me about your developer", "who created you", "who made you", "developer", "yusuf muhammedjamiu", "jamiu", "grieezboy"].some(p => query.includes(p));
            const isImageGen = ["generate image", "create image", "draw", "picture of", "photo of", "image of"].some(p => query.includes(p));
            const isStory = ["tell me a story", "write a story", "generate a story", "narrate", "once upon a time"].some(p => query.includes(p));

            try {
                // Handling Image Generation
                if (isImageGen) {
                    const prompt = val.replace(/(generate|create|draw|an|image|of|picture|photo)/gi, "").trim();
                    const apiUrl = `https://eliteprotech-apis.zone.id/image?q=${encodeURIComponent(prompt)}`;
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    
                    botRow.querySelector('.thinking-ui').style.display = 'none';
                    const bubble = botRow.querySelector('.bot-msg');
                    
                    if (data.status && data.images && data.images.length > 0) {
                        const imageUrl = data.images[Math.floor(Math.random() * data.images.length)];
                        bubble.innerHTML = `Here's a result for: <b>${prompt}</b>
                            <div class="image-result">
                                <img src="${imageUrl}" alt="Generated Image" onload="this.style.opacity='1'" style="opacity:0; transition: opacity 0.5s">
                                <div class="image-footer">
                                    <a href="${imageUrl}" target="_blank" class="download-link"><i class="fas fa-external-link-alt"></i> View Original</a>
                                    <span style="font-size:0.6rem; opacity:0.5">Source: GrieezBoy API</span>
                                </div>
                            </div>`;
                        if(autoRead.checked) speakText(`Here is the image I found for ${prompt}`, null);
                    } else {
                        bubble.innerText = "I couldn't find any images for that prompt.";
                    }
                    botRow.querySelector('.bot-disclaimer').style.display = 'block';
                    isBusy = false;
                    chatArea.scrollTop = chatArea.scrollHeight;
                    return;
                }

                // Handling Story Generation
                if (isStory) {
                    const storyPrompt = val.replace(/(tell|write|generate|a|story|about|narrate)/gi, "").trim() || "a random tale";
                    const storyUrl = `https://eliteprotech-apis.zone.id/story?text=${encodeURIComponent(storyPrompt)}`;
                    const response = await fetch(storyUrl);
                    const data = await response.json();
                    
                    botRow.querySelector('.thinking-ui').style.display = 'none';
                    const bubble = botRow.querySelector('.bot-msg');
                    const disclaimer = botRow.querySelector('.bot-disclaimer');
                    const speakBtn = botRow.querySelector('.speak-btn');
                    
                    const storyText = data.story || "I'm sorry, I couldn't weave a tale right now.";
                    
                    let i = 0;
                    const interval = setInterval(() => {
                        if (i < storyText.length) {
                            bubble.innerHTML = `<div class="story-container"><span class="story-title">📖 A GrieezBoy Story</span>${simpleFormat(escapeHTML(storyText.substring(0, i + 5)))}</div>`;
                            i += 8;
                            chatArea.scrollTop = chatArea.scrollHeight;
                        } else {
                            clearInterval(interval);
                            disclaimer.style.display = 'block';
                            speakBtn.style.display = 'flex';
                            speakBtn.onclick = () => speakText(storyText, speakBtn);
                            if(autoRead.checked) speakText(storyText, speakBtn);
                            isBusy = false;
                        }
                    }, 10);
                    return;
                }

                // Standard Chat
                let fullText = "";
                if (isDeveloper) {
                    fullText = "My developer's name is Yusuf MuhammedJamiu, popularly known as GrieezBoy. Some people call him Chief. He lives in Abuja and is from Okene, Kogi State. He is currently 24 years old, born on April 12th, 2001.";
                } else {
                    const res = await fetch(`https://eliteprotech-apis.zone.id/copilot?q=${encodeURIComponent(val)}`);
                    const data = await res.json();
                    fullText = data.text.replace(/Copilot/gi, "GrieezBot");
                }

                botRow.querySelector('.thinking-ui').style.display = 'none';
                const bubble = botRow.querySelector('.bot-msg');
                const disclaimer = botRow.querySelector('.bot-disclaimer');
                const speakBtn = botRow.querySelector('.speak-btn');

                let i = 0;
                const interval = setInterval(() => {
                    if (i < fullText.length) {
                        bubble.innerHTML = simpleFormat(escapeHTML(fullText.substring(0, i + 1)));
                        i += 3;
                        chatArea.scrollTop = chatArea.scrollHeight;
                    } else {
                        clearInterval(interval);
                        bubble.innerHTML = renderFinalContent(fullText);
                        disclaimer.style.display = 'block';
                        speakBtn.style.display = 'flex';
                        speakBtn.onclick = () => speakText(fullText, speakBtn);
                        if(autoRead.checked) speakText(fullText, speakBtn);
                        isBusy = false;
                        chatArea.scrollTop = chatArea.scrollHeight;
                    }
                }, 10);
            } catch {
                botRow.querySelector('.thinking-ui').innerText = "Network error. Try again.";
                isBusy = false;
            }
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
