<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBoy AI | Yusuf Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00f2ff; 
            --accent-glow: rgba(0, 242, 255, 0.4);
            --bg: #0b141a; 
            --glass: #111b21;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e9edef;
            --user-bubble: #005c4b; 
            --bot-bubble: #202c33; 
        }

        .light-mode {
            --bg: #efeae2; 
            --glass: #f0f2f5;
            --border: rgba(0, 0, 0, 0.08);
            --text: #111b21;
            --accent: #00a884;
            --user-bubble: #d9fdd3; 
            --bot-bubble: #ffffff; 
        }

        /* STRICT FULL SCREEN FIX */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100vh; 
            height: 100dvh; /* Dynamic viewport for mobile */
            width: 100vw; 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; /* Prevents body scroll */
            position: fixed; 
        }

        body { display: flex; transition: background 0.3s ease; }

        /* Sidebar Overlay Logic */
        .sidebar { 
            width: 300px; background: var(--glass); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 25px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2001;
            height: 100%;
        }

        .sidebar-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            display: none; z-index: 2000; backdrop-filter: blur(2px);
        }

        /* MAIN LAYOUT ENGINE */
        .main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            width: 100%;
            position: relative; 
        }

        .top-nav { 
            height: 65px; 
            min-height: 65px;
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 20px; 
            padding-top: env(safe-area-inset-top); /* iPhone Notch support */
            background: var(--glass); 
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        /* CHAT AREA WITH ANIMATED BG */
        .chat-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 5%; 
            position: relative; 
            z-index: 1;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        
        .chat-area::after {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: min(400px, 80vw); 
            height: min(400px, 80vw);
            background-image: url('https://i.pinimg.com/originals/c7/e1/b7/c7e1b7b5753737039e1bfcda313f2728.gif'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.07;
            z-index: -1;
            pointer-events: none;
        }

        .message-wrapper { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 18px; }

        /* WHATSAPP ALIGNMENT + AVATARS */
        .message-row { display: flex; width: 100%; align-items: flex-end; gap: 10px; animation: fadeIn 0.3s ease; }
        .user-row { justify-content: flex-end; flex-direction: row-reverse; }
        .bot-row { justify-content: flex-start; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

        .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; }
        .bot-avatar { 
            background: var(--accent); color: #000; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 0.8rem; box-shadow: 0 0 10px var(--accent-glow); 
        }

        .chat-bubble { 
            padding: 10px 14px; border-radius: 12px; 
            line-height: 1.5; font-size: 0.95rem; max-width: 78%; 
            position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .bot-msg { background: var(--bot-bubble); border-bottom-left-radius: 2px; }
        .user-msg { background: var(--user-bubble); border-bottom-right-radius: 2px; }

        /* INPUT AREA */
        .input-wrap { 
            padding: 12px 5%; 
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); /* Support for home bar */
            background: var(--glass); 
            z-index: 10; 
            border-top: 1px solid var(--border);
        }
        .input-box { 
            max-width: 900px; margin: 0 auto; background: var(--bg); 
            border: 1px solid var(--border); padding: 6px 10px; 
            border-radius: 28px; display: flex; align-items: center; gap: 10px;
        }
        input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 1rem; padding: 8px 5px; }
        
        .action-btn { 
            background: none; border: none; color: #8696a0; cursor: pointer; 
            width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }
        .send-btn { background: var(--accent); color: #fff; }

        /* Code & Responsive Sidebar Fix */
        pre { background: #000; color: #0f0; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 8px 0; font-size: 0.85rem; border: 1px solid #333; }
        
        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: -300px; height: 100dvh; }
            .sidebar.open { left: 0; }
            .sidebar.open + .sidebar-overlay { display: block; }
            .chat-bubble { max-width: 88%; }
        }

        select { width: 100%; padding: 10px; border-radius: 8px; background: var(--bg); color: var(--text); border: 1px solid var(--border); margin: 15px 0; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <h2 style="color: var(--accent);">GrieezBoy</h2>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 25px;">Yusuf Edition AI</p>
        
        <button onclick="location.reload()" style="padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;">+ New Chat</button>

        <p style="font-size: 0.7rem; margin-top: 20px; opacity: 0.6;">AI VOICE ENGINE</p>
        <select id="voiceSelect">
            <option value="Rex">Rex (Default)</option>
            <option value="Male v1">Male v1</option>
            <option value="Female v1">Female v1</option>
            <option value="Male v2">Male v2</option>
            <option value="Female v2">Female v2</option>
        </select>
        <div style="margin-top: auto; font-size: 0.65rem; opacity: 0.3; text-align: center;">GrieezBoy OS v4.0</div>
    </aside>
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <main class="main">
        <nav class="top-nav">
            <button onclick="toggleSidebar()" class="action-btn" style="color: var(--text);"><i class="fas fa-bars"></i></button>
            <span style="font-weight: 600;">GrieezBoy AI</span>
            <div style="display: flex; gap: 5px;">
                <i class="fas fa-moon action-btn" id="themeBtn" onclick="toggleTheme()"></i>
                <i class="fas fa-volume-up action-btn" id="muteIcon" onclick="toggleMute()"></i>
            </div>
        </nav>

        <div class="chat-area" id="chatArea">
            <div class="message-wrapper" id="chatMessages">
                <div class="message-row bot-row">
                    <div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>
                    <div class="chat-bubble bot-msg">System Active. I am <b>GrieezBoy</b>. How can Yusuf's tech help you today?</div>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <i class="fas fa-microphone action-btn" id="micBtn"></i>
                <input type="text" id="userInput" placeholder="Ask GrieezBoy..." autocomplete="off">
                <button class="action-btn send-btn" id="sendBtn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sidebar = document.getElementById('sidebar');
        const voiceSelect = document.getElementById('voiceSelect');
        
        let isMuted = false, isBusy = false, currentAudio = null;

        function speak(text) {
            if (isMuted) return;
            if (currentAudio) currentAudio.pause();
            const clean = text.replace(/```([\s\S]*?)```/g, ' Code ').replace(/[#*`_-]/g, '');
            currentAudio = new Audio(`https://eliteprotech-apis.zone.id/tts?text=${encodeURIComponent(clean)}&voice=${voiceSelect.value}`);
            currentAudio.play().catch(e => console.log("Audio Pending..."));
        }

        function toggleSidebar() { sidebar.classList.toggle('open'); }
        function closeSidebar() { sidebar.classList.remove('open'); }
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeBtn').className = document.body.classList.contains('light-mode') ? 'fas fa-sun action-btn' : 'fas fa-moon action-btn';
        }
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteIcon').className = isMuted ? 'fas fa-volume-mute action-btn' : 'fas fa-volume-up action-btn';
            if (isMuted && currentAudio) currentAudio.pause();
        }

        function formatText(text) {
            let safe = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            safe = safe.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                       .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                       .replace(/\n/g, '<br>');
            return safe;
        }

        function addMessage(text, isUser, isImage = false) {
            const div = document.createElement('div');
            div.className = `message-row ${isUser ? 'user-row' : 'bot-row'}`;
            
            const formatted = isImage ? `<img src="${text}" style="width:100%; border-radius:8px; margin-top:5px;">` : formatText(text);
            const userAvatar = `<img src="https://api.dicebear.com/7.x/bottts/svg?seed=${Math.random()}" class="avatar" style="background:var(--border);">`;
            const botAvatar = `<div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>`;

            div.innerHTML = `
                ${isUser ? userAvatar : botAvatar}
                <div class="chat-bubble ${isUser ? 'user-msg' : 'bot-msg'}">
                    ${isUser ? text : (isImage ? formatted : '<span class="typing"></span>')}
                </div>
            `;

            chatMessages.appendChild(div);
            chatArea.scrollTo(0, chatArea.scrollHeight);

            if (!isUser && !isImage) {
                const target = div.querySelector('.typing');
                let i = 0;
                const timer = setInterval(() => {
                    if (i < text.length) {
                        target.textContent += text.charAt(i++);
                        chatArea.scrollTop = chatArea.scrollHeight;
                    } else {
                        clearInterval(timer);
                        target.parentElement.innerHTML = formatted;
                        speak(text);
                        isBusy = false;
                        chatArea.scrollTop = chatArea.scrollHeight;
                    }
                }, 15);
            } else if (isImage) isBusy = false;
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || isBusy) return;
            isBusy = true; userInput.value = "";
            addMessage(val, true);

            if (val.toLowerCase().includes("draw") || val.toLowerCase().includes("generate image")) {
                const p = val.replace(/draw|generate image/gi, "").trim();
                addMessage(`https://image.pollinations.ai/prompt/${encodeURIComponent(p)}?nologo=true`, false, true);
                return;
            }

            try {
                const res = await fetch('https://eliteprotech-apis.zone.id/copilot?q=' + encodeURIComponent(val));
                const data = await res.json();
                let clean = data.text.replace(/Copilot/gi, "GrieezBoy").replace(/Microsoft/gi, "Yusuf's Tech");
                addMessage(clean, false);
            } catch {
                addMessage("API Offline. Check connection.", false);
                isBusy = false;
            }
        }

        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
            const rec = new SpeechRec();
            document.getElementById('micBtn').onclick = () => { rec.start(); document.getElementById('micBtn').style.color = 'var(--accent)'; };
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleSend(); };
            rec.onend = () => { document.getElementById('micBtn').style.color = '#8696a0'; };
        }
        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
