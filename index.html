<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBoy AI Pro | Yusuf Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00f2ff; 
            --accent-glow: rgba(0, 242, 255, 0.4);
            --bg-deep: #050a10; 
            --panel: rgba(17, 27, 33, 0.9);
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #e9edef;
            --user-bubble: #005c4b; 
            --bot-bubble: #202c33; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100dvh; width: 100vw; background: var(--bg-deep); color: var(--text-main); overflow: hidden; position: fixed; }
        
        /* Pro Background */
        body { 
            display: flex; 
            background: radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 100% 100%, rgba(0, 242, 255, 0.03) 0%, transparent 50%), #050a10;
        }

        body::before {
            content: ""; position: fixed; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px; opacity: 0.15; pointer-events: none;
        }

        /* Sidebar */
        .sidebar { width: 280px; background: var(--panel); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; transition: 0.4s; z-index: 2001; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; z-index: 2000; backdrop-filter: blur(5px); }

        /* Layout */
        .main { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
        .top-nav { height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(11, 20, 26, 0.6); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 10; }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .message-wrapper { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

        /* Alignment */
        .message-row { display: flex; width: 100%; align-items: flex-end; gap: 12px; animation: msgFade 0.3s ease; }
        @keyframes msgFade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .bot-row { justify-content: flex-start; }
        .user-row { justify-content: flex-end; }

        .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; border: 1px solid var(--border); transition: 0.3s; }
        .bot-avatar { background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
        
        /* Talking Glow Animation */
        .bot-avatar.talking { box-shadow: 0 0 20px var(--accent-glow); animation: glowPulse 1.5s infinite; }
        @keyframes glowPulse { 0% { box-shadow: 0 0 5px var(--accent-glow); } 50% { box-shadow: 0 0 25px var(--accent); } 100% { box-shadow: 0 0 5px var(--accent-glow); } }

        .chat-bubble { padding: 12px 16px; border-radius: 20px; line-height: 1.5; font-size: 0.95rem; max-width: 75%; position: relative; }
        .bot-msg { background: var(--bot-bubble); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .user-msg { background: var(--user-bubble); border-bottom-right-radius: 4px; }

        /* Thinking State UI */
        .thinking-box { font-size: 0.85rem; color: var(--accent); opacity: 0.8; display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .thinking-box i { animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Code Blocks */
        .code-container { margin: 12px 0; background: #0d1117; border-radius: 10px; border: 1px solid #30363d; overflow: hidden; position: relative; }
        .code-header { background: #161b22; padding: 8px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        .copy-btn { background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; cursor: pointer; }
        pre { padding: 15px; color: #c9d1d9; overflow-x: auto; font-size: 0.85rem; font-family: 'Fira Code', monospace; }

        /* Input System */
        .input-wrap { padding: 15px 20px; background: rgba(11, 20, 26, 0.95); border-top: 1px solid var(--border); }
        .input-box { max-width: 900px; margin: 0 auto; background: #2a3942; border-radius: 30px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; }
        input { flex: 1; background: none; border: none; color: white; outline: none; font-size: 1rem; padding: 8px; }
        
        .action-btn { background: none; border: none; color: #8696a0; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        #stopBtn { display: none; color: #ff3b3b; background: rgba(255, 59, 59, 0.1); }
        .send-btn { background: var(--accent); color: #000; font-size: 1.1rem; }

        @media (max-width: 768px) { .sidebar { position: fixed; left: -280px; height: 100dvh; } .sidebar.open { left: 0; } .sidebar.open + .sidebar-overlay { display: block; } }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #202c33; color: white; border: 1px solid var(--border); margin: 10px 0; outline: none; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <h2 style="color: var(--accent);">GrieezBoy</h2>
        <p style="font-size: 0.6rem; color: var(--accent); opacity: 0.5; margin-bottom: 30px; letter-spacing: 2px;">V11 PRO NEURAL</p>
        <button onclick="location.reload()" style="padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: 700; width: 100%;">NEW SESSION</button>
        <div style="margin-top: 30px;">
            <label style="font-size: 0.65rem; font-weight: 800; opacity: 0.4;">VOICE SELECTION</label>
            <select id="voiceSelect">
                <option value="Rex">Rex (Elite)</option>
                <option value="malev1">Male V1</option>
                <option value="femalev1">Female V1</option>
                <option value="malev2">Male V2</option>
                <option value="femalev2">Female V2</option>
            </select>
        </div>
    </aside>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main class="main">
        <nav class="top-nav">
            <i class="fas fa-bars action-btn" onclick="toggleSidebar()" style="color:white"></i>
            <span style="font-weight: 600; font-size: 0.9rem; letter-spacing: 1px;">GRIEEZBOY PRO</span>
            <div style="width: 40px;"></div>
        </nav>

        <div class="chat-area" id="chatArea">
            <div class="message-wrapper" id="chatMessages">
                <div class="message-row bot-row">
                    <div class="avatar bot-avatar" id="mainAvatar"><i class="fas fa-robot"></i></div>
                    <div class="chat-bubble bot-msg">Neural link active. I am <b>GrieezBoy</b>. How can I help you, Yusuf?</div>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <button class="action-btn" id="micBtn" onclick="startMic()"><i class="fas fa-microphone"></i></button>
                <button class="action-btn" id="stopBtn" onclick="stopSpeech()"><i class="fas fa-stop-circle"></i></button>
                <input type="text" id="userInput" placeholder="Command GrieezBoy..." autocomplete="off">
                <button class="action-btn send-btn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sidebar = document.getElementById('sidebar');
        const voiceSelect = document.getElementById('voiceSelect');
        const stopBtn = document.getElementById('stopBtn');
        const micBtn = document.getElementById('micBtn');

        let isBusy = false, currentAudio = null;

        // --- TTS & GLOW ---
        function speak(text) {
            stopSpeech();
            const cleanText = text.replace(/```([\s\S]*?)```/g, ' Code block ').replace(/[#*`_-]/g, '');
            const voice = voiceSelect.value;
            const url = `https://eliteprotech-apis.zone.id/tts?text=${encodeURIComponent(cleanText)}&voice=${voice}`;
            
            currentAudio = new Audio(url);
            
            currentAudio.onplay = () => { 
                stopBtn.style.display = 'flex'; 
                micBtn.style.display = 'none';
                document.querySelectorAll('.bot-avatar').forEach(a => a.classList.add('talking'));
            };
            
            currentAudio.onended = () => { 
                stopSpeech();
            };

            currentAudio.play().catch(e => {
                const utter = new SpeechSynthesisUtterance(cleanText);
                utter.onstart = () => { stopBtn.style.display = 'flex'; micBtn.style.display = 'none'; document.querySelectorAll('.bot-avatar').forEach(a => a.classList.add('talking')); };
                utter.onend = () => stopSpeech();
                window.speechSynthesis.speak(utter);
            });
        }

        function stopSpeech() {
            if (currentAudio) { currentAudio.pause(); currentAudio = null; }
            window.speechSynthesis.cancel();
            stopBtn.style.display = 'none';
            micBtn.style.display = 'flex';
            document.querySelectorAll('.bot-avatar').forEach(a => a.classList.remove('talking'));
        }

        // --- UI LOGIC ---
        function toggleSidebar() { sidebar.classList.toggle('open'); document.getElementById('overlay').style.display = sidebar.classList.contains('open') ? 'block' : 'none'; }
        
        function copyCode(btn, b64) {
            navigator.clipboard.writeText(atob(b64)).then(() => {
                btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = "COPY", 2000);
            });
        }

        function formatMsg(text) {
            let res = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                          .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
            return res.replace(/```([\s\S]*?)```/g, (m, code) => {
                const b64 = btoa(unescape(encodeURIComponent(code.trim())));
                return `<div class="code-container"><div class="code-header"><span style="font-size:0.7rem;opacity:0.5">GRIIEZBOY CODE</span><button class="copy-btn" onclick="copyCode(this,'${b64}')">COPY</button></div><pre><code>${code.trim()}</code></pre></div>`;
            });
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || isBusy) return;
            isBusy = true; userInput.value = "";

            // Add User Message
            const userDiv = document.createElement('div');
            userDiv.className = 'message-row user-row';
            userDiv.innerHTML = `<div class="chat-bubble user-msg">${val}</div><img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Yusuf" class="avatar">`;
            chatMessages.appendChild(userDiv);
            chatArea.scrollTo(0, chatArea.scrollHeight);

            // Add Thinking State
            const botDiv = document.createElement('div');
            botDiv.className = 'message-row bot-row';
            botDiv.innerHTML = `
                <div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>
                <div class="chat-bubble bot-msg">
                    <div class="thinking-box"><i class="fas fa-brain"></i> GrieezBoy is thinking...</div>
                    <span class="typing"></span>
                </div>`;
            chatMessages.appendChild(botDiv);
            chatArea.scrollTo(0, chatArea.scrollHeight);

            try {
                const res = await fetch('https://eliteprotech-apis.zone.id/copilot?q=' + encodeURIComponent(val));
                const data = await res.json();
                botDiv.querySelector('.thinking-box').remove(); // Remove thinking text
                
                let clean = data.text.replace(/Copilot/gi, "GrieezBoy").replace(/Microsoft/gi, "Yusuf's Tech");
                const target = botDiv.querySelector('.typing');
                let i = 0;
                speak(clean); 
                
                const timer = setInterval(() => {
                    if (i < clean.length) {
                        target.textContent += clean.charAt(i++);
                        chatArea.scrollTop = chatArea.scrollHeight;
                    } else {
                        clearInterval(timer);
                        target.parentElement.innerHTML = formatMsg(clean);
                        isBusy = false;
                        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
                    }
                }, 10);
            } catch {
                botDiv.innerHTML = `<div class="avatar bot-avatar"><i class="fas fa-robot"></i></div><div class="chat-bubble bot-msg">Offline mode triggered. Check API connection.</div>`;
                isBusy = false;
            }
        }

        function startMic() {
            const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!Rec) return alert("Mic not supported.");
            const s = new Rec();
            s.onstart = () => micBtn.classList.add('mic-active');
            s.onend = () => micBtn.classList.remove('mic-active');
            s.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleSend(); };
            s.start();
        }

        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
