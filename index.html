<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBot Pro | Yusuf Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0b141a; 
            --glass: #111b21;
            --border: rgba(255, 255, 255, 0.1);
            --text: #e9edef;
            --user-bubble: #005c4b; 
            --bot-bubble: #202c33; 
        }

        .light-mode {
            --bg: #efeae2; 
            --glass: #f0f2f5;
            --border: rgba(0, 0, 0, 0.1);
            --text: #111b21;
            --accent: #00a884;
            --user-bubble: #d9fdd3; 
            --bot-bubble: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        html, body { 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; 
            background: var(--bg);
            position: fixed;
        }

        body { display: flex; transition: background 0.3s ease; }

        /* Sidebar */
        .sidebar { 
            width: 300px; background: var(--glass); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 25px; 
            transition: transform 0.3s ease; z-index: 2001;
        }

        .sidebar-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            display: none; z-index: 2000;
        }

        /* Main App Structure */
        .main { 
            flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; 
        }

        .top-nav { 
            height: 60px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: var(--glass); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* Chat Layout */
        .chat-area { 
            flex: 1; overflow-y: auto; padding: 20px 15px; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: 350px; opacity: 0.95;
            -webkit-overflow-scrolling: touch;
        }

        .message-wrapper { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }

        .message-row { display: flex; width: 100%; animation: fadeIn 0.3s ease; align-items: flex-end; gap: 8px; }
        .user-row { justify-content: flex-end; }
        .bot-row { justify-content: flex-start; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .chat-bubble { 
            padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; 
            max-width: 80%; position: relative; word-wrap: break-word;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .bot-msg { background: var(--bot-bubble); color: var(--text); border-top-left-radius: 0; }
        .user-msg { background: var(--user-bubble); color: var(--text); border-top-right-radius: 0; }

        /* Speak Button inside chat */
        .speak-btn {
            background: rgba(255,255,255,0.05); border: none; color: var(--accent);
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; transition: 0.2s;
        }
        .speak-btn:hover { background: var(--accent); color: #000; }

        /* Input Bar */
        .input-wrap { 
            padding: 12px; background: var(--glass); flex-shrink: 0;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        .input-box { 
            max-width: 800px; margin: 0 auto; background: var(--bg); 
            border: 1px solid var(--border); padding: 5px 12px; 
            border-radius: 25px; display: flex; align-items: center; gap: 10px;
        }
        input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 1rem; padding: 10px 0; }

        .action-btn { 
            background: none; border: none; color: #8696a0; cursor: pointer; 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: 0.2s;
        }
        .send-btn { background: var(--accent); color: #000; border-radius: 50%; width: 38px; height: 38px; }

        #micBtn.listening { color: #ff4b4b; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { scale: 1; } 50% { scale: 1.2; } 100% { scale: 1; } }

        .voice-wave { display: none; gap: 3px; align-items: center; }
        .voice-wave span { width: 3px; height: 10px; background: var(--accent); animation: wave 1s infinite; border-radius: 2px; }
        @keyframes wave { 0%, 100% { height: 5px; } 50% { height: 15px; } }

        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: -300px; height: 100dvh; }
            .sidebar.open { transform: translateX(300px); }
            .sidebar.open + .sidebar-overlay { display: block; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <h2 style="color: var(--accent);">GrieezBoy Pro</h2>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 25px;">Premium AI by GrieezBoy</p>
        
        <button onclick="location.reload()" style="padding: 12px; background: var(--accent); border: none; border-radius: 8px; font-weight: 800; cursor: pointer; margin-bottom: 20px;">NEW CHAT</button>

        <label style="font-size: 0.7rem; opacity: 0.6; font-weight: bold;">VOICE ENGINE</label>
        <select id="voiceSelect" style="width: 100%; padding: 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 8px; margin-top: 5px; margin-bottom: 15px;">
            <option value="rex">Rex (Default)</option>
            <option value="male1">Male Studio 1</option>
            <option value="male2">Male Studio 2</option>
            <option value="female1">Female Studio 1</option>
            <option value="female2">Female Studio 2</option>
        </select>

        <label style="font-size: 0.7rem; opacity: 0.6; font-weight: bold;">SPEECH SPEED</label>
        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" style="width: 100%; margin-top: 10px;">
    </aside>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main class="main">
        <nav class="top-nav">
            <button onclick="toggleSidebar()" class="action-btn" style="color: var(--text);"><i class="fas fa-bars"></i></button>
            <div style="text-align: center;">
                <div style="font-weight: 800; font-size: 0.9rem; letter-spacing: 1px;">GRIEEZBOT PRO</div>
                <div id="visualizer" class="voice-wave"><span></span><span></span><span></span></div>
            </div>
            <div style="display: flex;">
                <button onclick="toggleTheme()" class="action-btn"><i class="fas fa-adjust"></i></button>
                <button onclick="toggleMute()" id="muteIcon" class="action-btn"><i class="fas fa-volume-up"></i></button>
            </div>
        </nav>

        <div class="chat-area" id="chatArea">
            <div class="message-wrapper" id="chatMessages">
                <!-- Initial Message -->
                <div class="message-row bot-row">
                    <div class="chat-bubble bot-msg">Welcome to GrieezBot Pro. Developed by <b>GrieezBoy</b>. Audio vocalizer ready.</div>
                    <button class="speak-btn" onclick="speak(`Welcome to GrieezBot Pro. Developed by GrieezBoy. Audio vocalizer ready.`)"><i class="fas fa-volume-up"></i></button>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <button id="micBtn" class="action-btn"><i class="fas fa-microphone"></i></button>
                <input type="text" id="userInput" placeholder="Ask GrieezBoy anything..." autocomplete="off">
                <button class="action-btn send-btn" id="sendBtn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sidebar = document.getElementById('sidebar');
        const micBtn = document.getElementById('micBtn');
        const visualizer = document.getElementById('visualizer');
        const voiceSelect = document.getElementById('voiceSelect');
        const speedSlider = document.getElementById('speedSlider');

        let isMuted = false, isBusy = false, currentAudio = null;

        function toggleSidebar() { sidebar.classList.toggle('open'); }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteIcon').innerHTML = isMuted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
            if (isMuted && currentAudio) currentAudio.pause();
        }

        // --- MANUAL TTS TRIGGER ---
        async function speak(text) {
            if (isMuted) return;
            if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; }

            const cleanText = text.replace(/[*_#`~]/g, '').replace(/```[\s\S]*?```/g, 'code block');
            const url = `https://eliteprotech-apis.zone.id/tts?text=${encodeURIComponent(cleanText)}&voice=${voiceSelect.value}`;

            try {
                currentAudio = new Audio(url);
                currentAudio.playbackRate = speedSlider.value;
                currentAudio.onplay = () => visualizer.style.display = 'flex';
                currentAudio.onended = () => visualizer.style.display = 'none';
                await currentAudio.play();
            } catch (e) {
                console.error("Audio Failed:", e);
                visualizer.style.display = 'none';
            }
        }

        // --- MIC LOGIC ---
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
            const recognition = new SpeechRec();
            micBtn.onclick = () => {
                if(isBusy) return;
                recognition.start();
                micBtn.classList.add('listening');
            };
            recognition.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                handleSend();
            };
            recognition.onend = () => micBtn.classList.remove('listening');
            recognition.onerror = () => micBtn.classList.remove('listening');
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message-row ${isUser ? 'user-row' : 'bot-row'}`;
            
            if (isUser) {
                div.innerHTML = `<div class="chat-bubble user-msg">${text}</div>`;
            } else {
                div.innerHTML = `
                    <div class="chat-bubble bot-msg">
                        <span class="typing"></span>
                    </div>
                    <button class="speak-btn hidden-voice" style="display:none;"><i class="fas fa-volume-up"></i></button>
                `;
            }

            chatMessages.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;

            if (!isUser) {
                const target = div.querySelector('.typing');
                const btn = div.querySelector('.speak-btn');
                let i = 0;
                const timer = setInterval(() => {
                    if (i < text.length) {
                        target.textContent += text.charAt(i); i++;
                        chatArea.scrollTop = chatArea.scrollHeight;
                    } else {
                        clearInterval(timer);
                        target.parentElement.innerHTML = text.replace(/\n/g, '<br>');
                        btn.style.display = 'flex'; // Show manual speak button
                        btn.onclick = () => speak(text);
                        isBusy = false;
                    }
                }, 15);
            }
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || isBusy) return;
            if (currentAudio) currentAudio.pause();
            
            isBusy = true; 
            userInput.value = "";
            addMessage(val, true);

            try {
                const res = await fetch('https://eliteprotech-apis.zone.id/copilot?q=' + encodeURIComponent(val));
                const data = await res.json();
                let reply = data.text.replace(/Copilot/gi, "GrieezBot").replace(/Microsoft/gi, "GrieezBoy Labs");
                addMessage(reply, false);
            } catch {
                addMessage("GrieezBoy API connection lost.", false);
                isBusy = false;
            }
        }

        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
