<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBot Pro | Developed By GrieezBoy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #4285f4; --bg: #0b141a; --glass: #111b21;
            --border: rgba(255, 255, 255, 0.1); --text: #e9edef;
            --user-bubble: #005c4b; --bot-bubble: #202c33; 
            --disclaimer: #8696a0; --card-bg: rgba(255, 255, 255, 0.03);
        }
        .light-mode {
            --bg: #f0f2f5; --glass: #ffffff; --border: rgba(0, 0, 0, 0.1);
            --text: #111b21; --accent: #1a73e8; --user-bubble: #d9fdd3; --bot-bubble: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { height: 100dvh; width: 100vw; overflow: hidden; background: var(--bg); color: var(--text); display: flex; transition: 0.3s; }
        
        #auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 100%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 10px; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .sidebar { width: 280px; background: var(--glass); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: transform 0.3s ease; z-index: 2001; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }
        .top-nav { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; background: var(--glass); border-bottom: 1px solid var(--border); }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .input-wrap { padding: 15px; background: var(--glass); border-top: 1px solid var(--border); }
        .input-box { max-width: 700px; margin: 0 auto; background: var(--bg); border: 1px solid var(--border); border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; }
        input { flex: 1; background: none; border: none; color: var(--text); padding: 12px; outline: none; }

        .message-row { display: flex; margin-bottom: 20px; gap: 10px; animation: fadeIn 0.3s; width: 100%; }
        .user-row { flex-direction: row-reverse; }
        .chat-bubble { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; line-height: 1.5; word-wrap: break-word; }
        .bot-msg { background: var(--bot-bubble); border-bottom-left-radius: 2px; }
        .user-msg { background: var(--user-bubble); border-bottom-right-radius: 2px; }
        
        .story-container { border-left: 3px solid var(--accent); padding-left: 15px; font-style: italic; color: var(--text); margin: 5px 0; }
        .story-header { display: block; font-weight: bold; font-style: normal; color: var(--accent); margin-bottom: 8px; font-size: 0.8rem; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .history-item { padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; }
        .history-item:hover { background: var(--card-bg); }
        .active-chat { background: rgba(66, 133, 244, 0.15); border-color: var(--accent); color: var(--accent); }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; }
            .sidebar.open { transform: translateX(280px); }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="color:var(--accent); font-style:italic; font-weight:900;">GRIEEZBOT PRO</h1>
            <p id="auth-status" style="font-size:0.8rem; margin:15px 0; opacity:0.7;">Developed by GrieezBoy</p>
            <form id="authForm">
                <input type="email" id="email" class="auth-input" placeholder="Email" required>
                <input type="password" id="pass" class="auth-input" placeholder="Password" required>
                <button type="submit" class="auth-btn" id="loginBtn">Login</button>
            </form>
            <p style="margin-top:15px; font-size:0.8rem; cursor:pointer;" onclick="toggleAuth()">Need access? <span style="color:var(--accent)">Sign Up</span></p>
        </div>
    </div>

    <aside class="sidebar" id="sidebar">
        <h2 style="color:var(--accent);">GrieezBot</h2>
        <p style="font-size:0.6rem; opacity:0.5; margin-bottom:20px;">ABUJA TECH HUB</p>
        <button onclick="newChat()" style="width:100%; padding:12px; border-radius:10px; border:1px dashed var(--accent); background:none; color:var(--accent); font-weight:bold; cursor:pointer; margin-bottom:20px;">+ New Chat</button>
        <div id="history" style="flex:1; overflow-y:auto;"></div>
        <button onclick="logout()" style="width:100%; padding:12px; background:#ff4b4b; border:none; color:white; border-radius:10px; font-weight:bold; cursor:pointer;">Logout</button>
    </aside>

    <main class="main">
        <nav class="top-nav">
            <button onclick="toggleSidebar()" style="background:none; border:none; color:var(--text); font-size:1.2rem; cursor:pointer;"><i class="fas fa-bars"></i></button>
            <div style="font-weight:900; color:var(--accent);">GRIEEZBOT AI</div>
            <button onclick="toggleTheme()" style="background:none; border:none; color:var(--text); font-size:1.2rem; cursor:pointer;"><i class="fas fa-moon"></i></button>
        </nav>

        <div class="chat-area" id="chatBox">
            <div id="welcome" style="text-align:center; margin-top:100px; padding:20px;">
                <i class="fas fa-bolt fa-3x" style="color:var(--accent); margin-bottom:20px;"></i>
                <h2 style="margin-bottom:10px;">Hello, Chief GrieezBoy</h2>
                <p style="opacity:0.6; font-size:0.9rem;">Ask me to write a story, generate an image, or just chat.</p>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Message GrieezBot..." autocomplete="off">
                <button onclick="sendMessage()" style="background:var(--accent); color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, sendEmailVerification } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhiSfSaWNVfXZlW4Zqd08fEGWYHzqx3Eg",
            authDomain: "grieezbot.firebaseapp.com",
            projectId: "grieezbot",
            appId: "1:711236312178:web:aecbc2ea940e79a594f6eb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        let user = null, currentChatId = null, isSignUp = false;

        window.toggleAuth = () => {
            isSignUp = !isSignUp;
            document.getElementById('loginBtn').innerText = isSignUp ? "Sign Up" : "Login";
        };

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                if(isSignUp) {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(res.user);
                    alert("Verification link sent! Please check your inbox.");
                    await signOut(auth);
                } else {
                    const res = await signInWithEmailAndPassword(auth, email, pass);
                    if(!res.user.emailVerified) {
                        alert("Verify your email to continue.");
                        await signOut(auth);
                    }
                }
            } catch(err) { alert(err.message); }
        });

        onAuthStateChanged(auth, (u) => {
            if(u && u.emailVerified) {
                user = u;
                document.getElementById('auth-overlay').style.display = 'none';
                loadHistory();
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
            }
        });

        window.logout = () => signOut(auth);

        window.sendMessage = async () => {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val || !user) return;
            input.value = '';
            document.getElementById('welcome').style.display = 'none';

            if(!currentChatId) {
                const conv = await addDoc(collection(db, 'artifacts', 'grieezbot', 'users', user.uid, 'conversations'), {
                    title: val.substring(0, 25),
                    updatedAt: serverTimestamp()
                });
                currentChatId = conv.id;
            }

            const msgRef = collection(db, 'artifacts', 'grieezbot', 'users', user.uid, 'conversations', currentChatId, 'messages');
            renderMessage(val, 'user');
            await addDoc(msgRef, { text: val, sender: 'user', timestamp: serverTimestamp() });

            const tempBot = document.createElement('div');
            tempBot.innerHTML = `<div style="font-size:0.8rem; color:var(--accent); font-weight:bold; margin-bottom:10px;">Thinking...</div>`;
            document.getElementById('chatBox').appendChild(tempBot);

            try {
                let type = 'chat';
                if(val.toLowerCase().includes('image') || val.toLowerCase().includes('draw')) type = 'image';
                else if(val.toLowerCase().includes('story')) type = 'story';

                // BACKEND CALL
                const response = await fetch(`/api/chat?prompt=${encodeURIComponent(val)}&type=${type}`);
                const data = await response.json();
                
                tempBot.remove();
                const resultText = data.url || data.response;
                const resultType = data.type;

                renderMessage(resultText, 'bot', resultType);
                await addDoc(msgRef, { text: resultText, sender: 'bot', type: resultType, timestamp: serverTimestamp() });
            } catch(e) {
                tempBot.innerText = "Error connecting to GrieezBot backend.";
            }
        };

        function renderMessage(text, sender, type = 'chat') {
            const box = document.getElementById('chatBox');
            const row = document.createElement('div');
            row.className = `message-row ${sender === 'user' ? 'user-row' : ''}`;
            
            let html = '';
            if (type === 'image') html = `<img src="${text}" style="width:100%; border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.3);">`;
            else if (type === 'story') html = `<div class="story-container"><span class="story-header">A Story by GrieezBot</span>${text}</div>`;
            else html = text;
            
            row.innerHTML = `<div class="chat-bubble ${sender === 'user' ? 'user-msg' : 'bot-msg'}">${html}</div>`;
            box.appendChild(row);
            box.scrollTop = box.scrollHeight;
        }

        function loadHistory() {
            const q = query(collection(db, 'artifacts', 'grieezbot', 'users', user.uid, 'conversations'), orderBy('updatedAt', 'desc'));
            onSnapshot(q, (snap) => {
                const hist = document.getElementById('history');
                hist.innerHTML = '';
                snap.forEach(d => {
                    const div = document.createElement('div');
                    div.className = `history-item ${currentChatId === d.id ? 'active-chat' : ''}`;
                    div.innerHTML = `<span>${d.data().title}</span><i class="fas fa-trash" onclick="deleteConv('${d.id}')" style="opacity:0.5; font-size:0.7rem;"></i>`;
                    div.onclick = () => loadChat(d.id);
                    hist.appendChild(div);
                });
            });
        }

        window.loadChat = (id) => {
            currentChatId = id;
            document.getElementById('welcome').style.display = 'none';
            const qM = query(collection(db, 'artifacts', 'grieezbot', 'users', user.uid, 'conversations', id, 'messages'), orderBy('timestamp', 'asc'));
            onSnapshot(qM, (snap) => {
                document.getElementById('chatBox').innerHTML = '';
                snap.forEach(m => renderMessage(m.data().text, m.data().sender, m.data().type));
            });
        };

        window.deleteConv = async (id) => {
            event.stopPropagation();
            if(confirm("Delete this conversation?")) await deleteDoc(doc(db, 'artifacts', 'grieezbot', 'users', user.uid, 'conversations', id));
        };

        window.newChat = () => { currentChatId = null; document.getElementById('chatBox').innerHTML = ''; document.getElementById('welcome').style.display = 'block'; };
        window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
        window.toggleTheme = () => document.body.classList.toggle('light-mode');
        document.getElementById('userInput').onkeypress = (e) => e.key === 'Enter' && sendMessage();
    </script>
</body>
</html>
