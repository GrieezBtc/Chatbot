<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBot Pro | Yusuf Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0b141a; 
            --glass: #111b21;
            --border: rgba(255, 255, 255, 0.1);
            --text: #e9edef;
            --user-bubble: #005c4b; 
            --bot-bubble: #202c33; 
        }

        .light-mode {
            --bg: #efeae2; 
            --glass: #f0f2f5;
            --border: rgba(0, 0, 0, 0.1);
            --text: #111b21;
            --accent: #00a884;
            --user-bubble: #d9fdd3; 
            --bot-bubble: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100dvh; 
            width: 100vw; 
            overflow: hidden; 
            background: var(--bg);
            position: fixed;
        }

        body { display: flex; transition: background 0.3s ease; }

        .sidebar { 
            width: 280px; background: var(--glass); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 20px; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2001;
        }

        .sidebar-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            display: none; z-index: 2000; backdrop-filter: blur(2px);
        }

        .main { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; width: 100%; }

        .top-nav { 
            height: 65px; display: flex; align-items: center; justify-content: space-between; 
            padding: 0 15px; background: var(--glass); border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .chat-area { 
            flex: 1; overflow-y: auto; padding: 20px 10px; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: 400px;
            scroll-behavior: smooth;
        }

        .message-wrapper { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        .message-row { display: flex; width: 100%; animation: slideIn 0.3s ease; align-items: flex-end; gap: 10px; }
        .user-row { justify-content: flex-end; }
        .bot-row { justify-content: flex-start; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .chat-bubble { 
            padding: 14px 18px; border-radius: 18px; line-height: 1.6; font-size: 0.95rem; 
            max-width: 80%; position: relative; word-wrap: break-word;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .bot-msg { background: var(--bot-bubble); color: var(--text); border-bottom-left-radius: 4px; }
        .user-msg { background: var(--user-bubble); color: var(--text); border-bottom-right-radius: 4px; }

        /* Speak Button - Enhanced for visibility */
        .speak-btn {
            background: var(--accent); border: none; color: #000;
            width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }
        .speak-btn:active { transform: scale(0.9); }
        .speak-btn.playing { background: #ff3b3b; color: #fff; animation: pulsePlay 1s infinite; }

        @keyframes pulsePlay { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .input-wrap { 
            padding: 15px; background: var(--glass); flex-shrink: 0;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }
        .input-box { 
            max-width: 850px; margin: 0 auto; background: var(--bg); 
            border: 1px solid var(--border); padding: 6px 15px; 
            border-radius: 30px; display: flex; align-items: center; gap: 12px;
        }
        input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 1rem; padding: 12px 0; }

        .action-btn { 
            background: none; border: none; color: #8696a0; cursor: pointer; 
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem;
        }
        .send-btn { background: var(--accent); color: #000; border-radius: 50%; width: 40px; height: 40px; }

        #micBtn.listening { color: #ff3b3b; animation: micPulse 1.5s infinite; }
        @keyframes micPulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

        .voice-wave { display: none; gap: 4px; align-items: center; height: 20px; }
        .voice-wave span { width: 3px; height: 10px; background: var(--accent); animation: wave 0.8s infinite alternate; border-radius: 10px; }
        @keyframes wave { from { height: 4px; } to { height: 18px; } }

        @media (max-width: 768px) { 
            .sidebar { position: fixed; left: -280px; height: 100dvh; }
            .sidebar.open { transform: translateX(280px); }
            .sidebar.open + .sidebar-overlay { display: block; }
        }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <h2 style="color: var(--accent); font-weight: 800; letter-spacing: -1px;">GrieezBoy Pro</h2>
        <p style="font-size: 0.75rem; opacity: 0.6; margin-bottom: 30px;">Premium AI Vocal Suite</p>
        
        <button onclick="location.reload()" style="padding: 15px; background: var(--accent); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-bottom: 25px; width: 100%;">
            <i class="fas fa-plus"></i> NEW SESSION
        </button>

        <label style="font-size: 0.7rem; opacity: 0.5; font-weight: 800; text-transform: uppercase;">Voice Profile</label>
        <select id="voiceSelect" style="width: 100%; padding: 14px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; margin-top: 8px; margin-bottom: 20px; outline: none;">
            <option value="rex">Rex (AI Standard)</option>
            <option value="malev1">Male Studio 1</option>
            <option value="malev2">Male Studio 2</option>
            <option value="femalev1">Female Studio 1</option>
            <option value="femalev2">Female Studio 2</option>
        </select>

        <label style="font-size: 0.7rem; opacity: 0.5; font-weight: 800; text-transform: uppercase;">Playback Speed</label>
        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" style="width: 100%; margin-top: 15px;">
        
        <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border); font-size: 0.7rem; opacity: 0.4; text-align: center;">
            &copy; 2024 GrieezBoy Development
        </div>
    </aside>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main class="main">
        <nav class="top-nav">
            <button onclick="toggleSidebar()" class="action-btn" style="color: var(--text);"><i class="fas fa-bars"></i></button>
            <div style="text-align: center; flex: 1;">
                <div style="font-weight: 800; font-size: 0.95rem; color: var(--accent);">GRIEEZBOT PRO</div>
                <div id="visualizer" class="voice-wave" style="margin: 0 auto;"><span></span><span></span><span></span><span></span></div>
            </div>
            <div style="display: flex; gap: 5px;">
                <button onclick="toggleTheme()" class="action-btn"><i class="fas fa-circle-half-stroke"></i></button>
            </div>
        </nav>

        <div class="chat-area" id="chatArea">
            <div class="message-wrapper" id="chatMessages">
                <!-- Initial Welcome -->
                <div class="message-row bot-row">
                    <div class="chat-bubble bot-msg">Hello. I am <b>GrieezBot Pro</b>. Developed by <b>GrieezBoy</b>. All systems online. Click the speaker to hear me speak.</div>
                    <button class="speak-btn" onclick="manualSpeak(`Hello. I am GrieezBot Pro. Developed by GrieezBoy. All systems online.`, this)"><i class="fas fa-volume-up"></i></button>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <button id="micBtn" class="action-btn"><i class="fas fa-microphone"></i></button>
                <input type="text" id="userInput" placeholder="Message GrieezBoy AI..." autocomplete="off">
                <button class="action-btn send-btn" id="sendBtn" onclick="handleSend()"><i class="fas fa-arrow-up"></i></button>
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sidebar = document.getElementById('sidebar');
        const micBtn = document.getElementById('micBtn');
        const visualizer = document.getElementById('visualizer');
        const voiceSelect = document.getElementById('voiceSelect');
        const speedSlider = document.getElementById('speedSlider');

        let isBusy = false, currentAudio = null, activeBtn = null;

        function toggleSidebar() { sidebar.classList.toggle('open'); }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }

        // --- THE VOCAL ENGINE (REBUILT) ---
        async function manualSpeak(text, btnElement) {
            // 1. Reset current state
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
            }
            if (activeBtn) {
                activeBtn.classList.remove('playing');
                activeBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
            }

            // 2. Prepare text (Remove markdown & symbols)
            const cleanText = text.replace(/[*_#`~]/g, '').replace(/```[\s\S]*?```/g, 'code block');
            const voice = voiceSelect.value;
            const url = `https://eliteprotech-apis.zone.id/tts?text=${encodeURIComponent(cleanText)}&voice=${voice}`;

            // 3. UI Feedback
            activeBtn = btnElement;
            activeBtn.classList.add('playing');
            activeBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            visualizer.style.display = 'flex';

            try {
                // 4. Load Audio
                currentAudio = new Audio(url);
                currentAudio.playbackRate = parseFloat(speedSlider.value);

                // 5. Events
                currentAudio.oncanplaythrough = () => {
                    activeBtn.innerHTML = '<i class="fas fa-wave-square"></i>';
                    currentAudio.play();
                };

                currentAudio.onended = () => {
                    stopVocalUI();
                };

                currentAudio.onerror = () => {
                    console.error("Audio API Error");
                    stopVocalUI();
                };

            } catch (err) {
                console.error("Vocal Engine Error:", err);
                stopVocalUI();
            }
        }

        function stopVocalUI() {
            if (activeBtn) {
                activeBtn.classList.remove('playing');
                activeBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
            }
            visualizer.style.display = 'none';
        }

        // --- MIC ENGINE ---
        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRec) {
            const recognition = new SpeechRec();
            recognition.lang = 'en-US';
            
            micBtn.onclick = () => {
                if(isBusy) return;
                try {
                    recognition.start();
                    micBtn.classList.add('listening');
                } catch(e) { recognition.stop(); }
            };

            recognition.onresult = (e) => {
                userInput.value = e.results[0][0].transcript;
                handleSend();
            };

            recognition.onend = () => micBtn.classList.remove('listening');
            recognition.onerror = () => micBtn.classList.remove('listening');
        }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message-row ${isUser ? 'user-row' : 'bot-row'}`;
            
            if (isUser) {
                div.innerHTML = `<div class="chat-bubble user-msg">${text}</div>`;
            } else {
                div.innerHTML = `
                    <div class="chat-bubble bot-msg"><span class="typing"></span></div>
                    <button class="speak-btn" style="opacity:0; pointer-events:none;"><i class="fas fa-volume-up"></i></button>
                `;
            }

            chatMessages.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;

            if (!isUser) {
                const target = div.querySelector('.typing');
                const btn = div.querySelector('.speak-btn');
                let i = 0;
                
                const timer = setInterval(() => {
                    if (i < text.length) {
                        target.textContent += text.charAt(i); i++;
                        chatArea.scrollTop = chatArea.scrollHeight;
                    } else {
                        clearInterval(timer);
                        target.parentElement.innerHTML = text.replace(/\n/g, '<br>');
                        btn.style.opacity = '1';
                        btn.style.pointerEvents = 'auto';
                        btn.onclick = () => manualSpeak(text, btn);
                        isBusy = false;
                    }
                }, 12);
            }
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || isBusy) return;
            
            if (currentAudio) currentAudio.pause();
            
            isBusy = true; 
            userInput.value = "";
            addMessage(val, true);

            try {
                // Show thinking...
                const res = await fetch('https://eliteprotech-apis.zone.id/copilot?q=' + encodeURIComponent(val));
                const data = await res.json();
                
                // Content Filter/Branding
                let reply = data.text.replace(/Copilot/gi, "GrieezBot").replace(/Microsoft/gi, "GrieezBoy Lab");
                addMessage(reply, false);
            } catch {
                addMessage("GrieezBoy API is currently offline. Please try again later.", false);
                isBusy = false;
            }
        }

        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
