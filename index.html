<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GrieezBoy AI | Yusuf Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --accent: #00f2ff; 
            --bg: #0b141a; 
            --glass: #111b21;
            --border: rgba(255, 255, 255, 0.08);
            --text: #e9edef;
            --user-bubble: #005c4b; 
            --bot-bubble: #202c33; 
        }

        .light-mode {
            --bg: #efeae2; 
            --glass: #f0f2f5;
            --border: rgba(0, 0, 0, 0.08);
            --text: #111b21;
            --accent: #00a884;
            --user-bubble: #d9fdd3; 
            --bot-bubble: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100dvh; width: 100vw; background: var(--bg); color: var(--text); overflow: hidden; position: fixed; }
        body { display: flex; transition: background 0.3s ease; }

        /* Sidebar */
        .sidebar { width: 300px; background: var(--glass); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; transition: 0.3s; z-index: 2001; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 2000; backdrop-filter: blur(2px); }

        /* Main Chat */
        .main { flex: 1; display: flex; flex-direction: column; height: 100%; width: 100%; position: relative; }
        .top-nav { height: 65px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: var(--glass); border-bottom: 1px solid var(--border); z-index: 10; }

        .chat-area { flex: 1; overflow-y: auto; padding: 20px 15px; position: relative; z-index: 1; scroll-behavior: smooth; }
        
        /* Bot Animation Background */
        .chat-area::after { 
            content: ''; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 300px; height: 300px; background-image: url('https://i.pinimg.com/originals/c7/e1/b7/c7e1b7b5753737039e1bfcda313f2728.gif'); 
            background-size: contain; background-repeat: no-repeat; opacity: 0.08; z-index: -1; pointer-events: none; 
        }

        .message-wrapper { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }

        /* ALIGNMENT FIX */
        .message-row { display: flex; width: 100%; align-items: flex-end; gap: 10px; }
        
        /* Bot on Left: [Avatar] [Bubble] */
        .bot-row { justify-content: flex-start; flex-direction: row; }
        
        /* User on Right: [Bubble] [Avatar] */
        .user-row { justify-content: flex-end; flex-direction: row; }

        .avatar { width: 35px; height: 35px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
        .bot-avatar { background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; box-shadow: 0 0 10px var(--accent); }

        .chat-bubble { padding: 10px 15px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; max-width: 75%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .bot-msg { background: var(--bot-bubble); border-bottom-left-radius: 4px; }
        .user-msg { background: var(--user-bubble); border-bottom-right-radius: 4px; }

        /* CODE BLOCK & COPY BTN */
        .code-container { position: relative; margin: 10px 0; background: #000; border-radius: 8px; border: 1px solid #333; overflow: hidden; }
        .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--accent); color: #000; border: none; padding: 4px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; cursor: pointer; z-index: 5; }
        pre { padding: 15px; color: #adbac7; overflow-x: auto; font-size: 0.85rem; font-family: monospace; white-space: pre-wrap; }

        /* INPUT AREA */
        .input-wrap { padding: 10px 15px; background: var(--glass); border-top: 1px solid var(--border); }
        .input-box { max-width: 800px; margin: 0 auto; background: var(--bg); border: 1px solid var(--border); padding: 5px 10px; border-radius: 25px; display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; color: var(--text); outline: none; font-size: 1rem; padding: 10px; }
        .action-btn { background: none; border: none; color: #8696a0; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .send-btn { background: var(--accent); color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) { .sidebar { position: fixed; left: -300px; height: 100dvh; } .sidebar.open { left: 0; } .sidebar.open + .sidebar-overlay { display: block; } }
        select { width: 100%; padding: 12px; border-radius: 10px; background: var(--bg); color: var(--text); border: 1px solid var(--border); margin: 15px 0; cursor: pointer; }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <h2 style="color: var(--accent);">GrieezBoy</h2>
        <p style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 25px;">Yusuf Edition AI</p>
        <button onclick="location.reload()" style="padding: 12px; width:100%; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: 700; cursor: pointer;">+ NEW CHAT</button>
        <p style="font-size: 0.75rem; margin-top: 25px; font-weight: 600;">AI VOICE</p>
        <select id="voiceSelect">
            <option value="Rex">Rex</option>
            <option value="malev1">Male v1</option>
            <option value="femalev1">Female v1</option>
            <option value="malev2">Male v2</option>
            <option value="femalev2">Female v2</option>
        </select>
        <div style="margin-top: auto; font-size: 0.65rem; opacity: 0.3; text-align: center;">GrieezBoy Core v7.0</div>
    </aside>
    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main class="main">
        <nav class="top-nav">
            <i class="fas fa-bars action-btn" onclick="toggleSidebar()" style="color:var(--text)"></i>
            <span style="font-weight: 700;">GRIEEZBOY AI</span>
            <div style="display: flex; gap: 15px;">
                <i class="fas fa-moon action-btn" id="themeBtn" onclick="toggleTheme()"></i>
                <i class="fas fa-volume-up action-btn" id="muteIcon" onclick="toggleMute()"></i>
            </div>
        </nav>

        <div class="chat-area" id="chatArea">
            <div class="message-wrapper" id="chatMessages">
                <div class="message-row bot-row">
                    <div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>
                    <div class="chat-bubble bot-msg">System Active. I am <b>GrieezBoy</b>. Ready to assist.</div>
                </div>
            </div>
        </div>

        <div class="input-wrap">
            <div class="input-box">
                <i class="fas fa-microphone action-btn" id="micBtn"></i>
                <input type="text" id="userInput" placeholder="Message GrieezBoy..." autocomplete="off">
                <button class="action-btn send-btn" onclick="handleSend()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </main>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const chatArea = document.getElementById('chatArea');
        const sidebar = document.getElementById('sidebar');
        const voiceSelect = document.getElementById('voiceSelect');
        
        let isMuted = false, isBusy = false, currentAudio = new Audio();

        // --- TTS SYSTEM WITH AUTO-PLAY FIX ---
        function speak(text) {
            if (isMuted) return;
            
            // Remove code blocks and markdown from speech
            const speechText = text.replace(/```([\s\S]*?)```/g, ' [Code Block] ').replace(/[#*`_-]/g, '');
            const voice = voiceSelect.value;
            const url = `https://eliteprotech-apis.zone.id/tts?text=${encodeURIComponent(speechText)}&voice=${voice}`;
            
            currentAudio.src = url;
            currentAudio.play().catch(e => {
                console.log("Audio Playback Error: Please ensure you interact with the page first.");
            });
        }

        // --- COPY LOGIC ---
        function copyCode(btn, encodedCode) {
            const code = atob(encodedCode);
            navigator.clipboard.writeText(code).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "COPIED!";
                btn.style.background = "#00ff88";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "var(--accent)";
                }, 2000);
            });
        }

        function formatText(text) {
            let formatted = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                               .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                               .replace(/\n/g, '<br>');
            
            // Handle Code Blocks with Copy Button
            formatted = formatted.replace(/```([\s\S]*?)```/g, (match, code) => {
                const b64 = btoa(code.trim());
                return `
                    <div class="code-container">
                        <button class="copy-btn" onclick="copyCode(this, '${b64}')">COPY</button>
                        <pre><code>${code.trim()}</code></pre>
                    </div>`;
            });
            return formatted;
        }

        function toggleSidebar() { sidebar.classList.toggle('open'); document.getElementById('overlay').style.display = sidebar.classList.contains('open') ? 'block' : 'none'; }
        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        function toggleMute() { isMuted = !isMuted; document.getElementById('muteIcon').className = isMuted ? 'fas fa-volume-mute action-btn' : 'fas fa-volume-up action-btn'; if(isMuted) currentAudio.pause(); }

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message-row ${isUser ? 'user-row' : 'bot-row'}`;
            
            // Random human avatar; Bot uses glowing robot
            const randomUserAvatar = `https://api.dicebear.com/7.x/pixel-art/svg?seed=${Math.random()}`;
            const avatarHtml = isUser 
                ? `<img src="${randomUserAvatar}" class="avatar">` 
                : `<div class="avatar bot-avatar"><i class="fas fa-robot"></i></div>`;

            // Order Logic: Bot (Avatar then Bubble) | User (Bubble then Avatar)
            div.innerHTML = isUser 
                ? `<div class="chat-bubble user-msg">${text}</div>${avatarHtml}`
                : `${avatarHtml}<div class="chat-bubble bot-msg"><span class="typing"></span></div>`;

            chatMessages.appendChild(div);
            chatArea.scrollTo(0, chatArea.scrollHeight);

            if (!isUser) {
                const target = div.querySelector('.typing');
                let i = 0;
                speak(text); 
                const timer = setInterval(() => {
                    if (i < text.length) {
                        target.textContent += text.charAt(i++);
                        chatArea.scrollTop = chatArea.scrollHeight;
                    } else {
                        clearInterval(timer);
                        target.parentElement.innerHTML = formatText(text);
                        isBusy = false;
                        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
                    }
                }, 15);
            }
        }

        async function handleSend() {
            const val = userInput.value.trim();
            if (!val || isBusy) return;
            
            // "Unlock" audio on user gesture for mobile browsers
            if(!isMuted) { currentAudio.play().then(() => currentAudio.pause()).catch(() => {}); }

            isBusy = true; userInput.value = "";
            addMessage(val, true);

            try {
                const res = await fetch('https://eliteprotech-apis.zone.id/copilot?q=' + encodeURIComponent(val));
                const data = await res.json();
                let response = data.text.replace(/Copilot/gi, "GrieezBoy").replace(/Microsoft/gi, "Yusuf's Tech");
                addMessage(response, false);
            } catch {
                addMessage("I lost connection to the server. Check your API.", false);
                isBusy = false;
            }
        }

        userInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    </script>
</body>
</html>
